<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <defs>
    <marker id="ax" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">제조업 AI 6대 분야 — 성숙도 vs 시장 성장률 (CAGR)</text>

  <!-- Chart background -->
  <rect x="80" y="44" width="580" height="292" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Quadrant backgrounds -->
  <rect x="80" y="44" width="290" height="146" rx="0" fill="#FEF9F0" opacity="0.6"/>
  <rect x="370" y="44" width="290" height="146" rx="0" fill="#F0FDF4" opacity="0.6"/>
  <rect x="80" y="190" width="290" height="146" rx="0" fill="#F5F5F5" opacity="0.6"/>
  <rect x="370" y="190" width="290" height="146" rx="0" fill="#EFF6FF" opacity="0.6"/>

  <!-- Quadrant labels -->
  <text x="225" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">성숙 · 안정 성장</text>
  <text x="515" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">성숙 · 고성장</text>
  <text x="225" y="326" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">초기 · 안정 성장</text>
  <text x="515" y="326" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">초기 · 고성장</text>

  <!-- Y axis -->
  <line x1="100" y1="54" x2="100" y2="328" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ax)"/>
  <!-- X axis -->
  <line x1="100" y1="328" x2="658" y2="328" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ax)"/>
  <!-- Center dividers -->
  <line x1="370" y1="44" x2="370" y2="336" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="80" y1="190" x2="660" y2="190" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Y axis label -->
  <text x="44" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#6B7280" transform="rotate(-90,44,200)">기술 성숙도 →</text>

  <!-- X axis label -->
  <text x="370" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#6B7280">시장 성장률 (CAGR) →</text>

  <!-- X axis ticks -->
  <text x="100" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">15%</text>
  <text x="235" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">20%</text>
  <text x="370" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">28%</text>
  <text x="515" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">42%</text>
  <text x="640" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#9CA3AF">50%</text>

  <!-- Y axis ticks -->
  <text x="76" y="332" text-anchor="end" font-family="monospace" font-size="9" fill="#9CA3AF">초기</text>
  <text x="76" y="194" text-anchor="end" font-family="monospace" font-size="9" fill="#9CA3AF">중기</text>
  <text x="76" y="66" text-anchor="end" font-family="monospace" font-size="9" fill="#9CA3AF">성숙</text>

  <!-- ① 품질검사 — CAGR 19.6%, 성숙 높음 → x≈228, y≈88 -->
  <circle cx="228" cy="88" r="30" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="228" y="84" text-anchor="middle" font-family="monospace" font-size="10" fill="#1D4ED8" font-weight="bold">품질검사</text>
  <text x="228" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#1D4ED8">19.6%</text>
  <text x="228" y="130" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">ROI 200~300%</text>

  <!-- ② 로보틱스 — CAGR 18.5%, 성숙 높음 → x≈208, y≈118 -->
  <circle cx="158" cy="128" r="26" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="158" y="124" text-anchor="middle" font-family="monospace" font-size="10" fill="#991B1B" font-weight="bold">로보틱스</text>
  <text x="158" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="#991B1B">18.5%</text>
  <text x="158" y="166" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">도입 계획 84%</text>

  <!-- ③ 공정최적화 — CAGR ~20%, 성숙 중간 → x≈235, y≈218 -->
  <circle cx="248" cy="222" r="26" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="248" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="#92400E" font-weight="bold">공정최적화</text>
  <text x="248" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400E">~20%</text>
  <text x="248" y="260" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">OEE 5~10%↑</text>

  <!-- ④ 예지보전 — CAGR 27.9%, 성숙 중상 → x≈358, y≈158 -->
  <circle cx="356" cy="158" r="28" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="356" y="154" text-anchor="middle" font-family="monospace" font-size="10" fill="#065F46" font-weight="bold">예지보전</text>
  <text x="356" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#065F46">27.9%</text>
  <text x="356" y="198" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">다운타임 30~50%↓</text>

  <!-- ⑤ 디지털트윈 — CAGR 47.9%, 성숙 중간 → x≈588, y≈200 -->
  <circle cx="582" cy="162" r="30" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="582" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#5B21B6" font-weight="bold">디지털트윈</text>
  <text x="582" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#5B21B6">47.9%</text>
  <text x="582" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">도입률 29%</text>

  <!-- ⑥ 공급망 — CAGR 42.7%, 성숙 초중기 → x≈528, y≈268 -->
  <circle cx="520" cy="268" r="30" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="520" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#9D174D" font-weight="bold">공급망 SCM</text>
  <text x="520" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#9D174D">42.7%</text>
  <text x="520" y="310" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">GenAI 침투 65%</text>
</svg>
