<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" fill="none">

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">제조업 AI 기술 로드맵 (2025~2030)</text>

  <!-- Timeline backbone -->
  <line x1="60" y1="100" x2="680" y2="100" stroke="#D1D5DB" stroke-width="3" stroke-linecap="round"/>

