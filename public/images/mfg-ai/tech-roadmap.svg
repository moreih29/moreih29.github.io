  <text x="130" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">현장 엔지니어 자연어 인터페이스</text>

  <text x="130" y="296" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">AI 도입률: 78% → 전 산업 확산</text>
  <text x="130" y="308" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">GenAI 시장: $630M → $2B</text>

