  <rect x="550" y="126" width="150" height="186" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="625" y="148" text-anchor="middle" font-family="monospace" font-size="11" fill="#065F46" font-weight="bold">자율 제조 확산</text>

  <rect x="562" y="158" width="126" height="30" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="625" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#065F46" font-weight="bold">자율 제조 확산</text>
  <text x="625" y="183" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">한국 30% · 선진국 50%+</text>

  <rect x="562" y="196" width="126" height="30" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="625" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#065F46" font-weight="bold">FM 파인튜닝 경쟁</text>
  <text x="625" y="221" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">자사 데이터 튜닝이 차별화</text>

  <rect x="562" y="234" width="126" height="30" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="625" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#065F46" font-weight="bold">도메인 FM 생태계</text>
  <text x="625" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">반도체·자동차·제약 특화</text>

  <text x="625" y="296" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">GenAI 시장: $13.9B</text>
  <text x="625" y="308" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">엣지 AI: $118.7B</text>

  <!-- Arrows between phases -->
  <line x1="230" y1="100" x2="276" y2="100" stroke="#D1D5DB" stroke-width="2"/>
  <polygon points="274,96 282,100 274,104" fill="#D1D5DB"/>
  <line x1="490" y1="100" x2="526" y2="100" stroke="#D1D5DB" stroke-width="2"/>
  <polygon points="524,96 532,100 524,104" fill="#D1D5DB"/>
</svg>
