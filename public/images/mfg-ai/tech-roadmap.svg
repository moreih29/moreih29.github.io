  <circle cx="130" cy="100" r="14" fill="#3B82F6" stroke="white" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">25~26</text>

  <!-- 2027~2028 -->
  <circle cx="390" cy="100" r="14" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <text x="390" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">27~28</text>

  <!-- 2029~2030 -->
  <circle cx="640" cy="100" r="14" fill="#10B981" stroke="white" stroke-width="2"/>
  <text x="640" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">29~30</text>

