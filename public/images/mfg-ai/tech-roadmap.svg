  <text x="390" y="221" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">LLM 기반 제어 로직 소프트웨어화</text>

  <rect x="302" y="234" width="176" height="30" rx="4" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="390" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#5B21B6" font-weight="bold">중소기업 GenAI 확대</text>
  <text x="390" y="259" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">SaaS형 제조 AI 진입 장벽 낮춤</text>

  <text x="390" y="296" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">엣지 AI 시장: $50B 돌파</text>
  <text x="390" y="308" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">디지털트윈 도입률: 50%+</text>

