  <rect x="30" y="126" width="200" height="186" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="148" text-anchor="middle" font-family="monospace" font-size="11" fill="#1D4ED8" font-weight="bold">토대 놓기</text>

  <rect x="42" y="158" width="176" height="30" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="130" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#1D4ED8" font-weight="bold">IFM 상용화 초기</text>
  <text x="130" y="183" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">산업 특화 Foundation Model 경쟁 시작</text>

  <rect x="42" y="196" width="176" height="30" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="130" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#1D4ED8" font-weight="bold">엣지 AI + 5G 본격화</text>
  <text x="130" y="221" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">공장 내 실시간 추론 인프라 구축</text>

