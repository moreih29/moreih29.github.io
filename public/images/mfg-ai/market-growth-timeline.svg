<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" fill="none">
  <defs>
    <marker id="ax" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">제조업 AI 시장 규모 추이 (2021~2026)</text>

  <!-- Chart area background -->
  <rect x="80" y="40" width="580" height="210" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Y axis -->
  <line x1="100" y1="48" x2="100" y2="244" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ax)"/>
  <!-- X axis -->
  <line x1="100" y1="240" x2="658" y2="240" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ax)"/>

  <!-- Y axis label -->
  <text x="44" y="155" text-anchor="middle" font-family="monospace" font-size="10" fill="#6B7280" transform="rotate(-90,44,155)">시장 규모 ($B) →</text>

  <!-- Y grid + labels -->
  <line x1="100" y1="200" x2="652" y2="200" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="160" x2="652" y2="160" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="120" x2="652" y2="120" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="80" x2="652" y2="80" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="94" y="244" text-anchor="end" font-family="monospace" font-size="8" fill="#9CA3AF">0</text>
  <text x="94" y="204" text-anchor="end" font-family="monospace" font-size="8" fill="#9CA3AF">10B</text>
  <text x="94" y="164" text-anchor="end" font-family="monospace" font-size="8" fill="#9CA3AF">20B</text>
  <text x="94" y="124" text-anchor="end" font-family="monospace" font-size="8" fill="#9CA3AF">30B</text>
  <text x="94" y="84" text-anchor="end" font-family="monospace" font-size="8" fill="#9CA3AF">40B</text>

  <!-- Data points: x positions for years 2021~2026 evenly spaced (100~640) -->
  <!-- 2021: $4.5B  → y = 240 - (4.5/40)*160 = 240-18 = 222 -->
  <!-- 2022: $6.2B  → y = 240 - (6.2/40)*160 = 240-25 = 215 -->
  <!-- 2023: $10B   → y = 240 - (10/40)*160  = 240-40 = 200 -->
  <!-- 2024: $17B   → y = 240 - (17/40)*160  = 240-68 = 172 -->
  <!-- 2025: $26B   → y = 240 - (26/40)*160  = 240-104= 136 -->
  <!-- 2026(est): $38B → y = 240 - (38/40)*160 = 240-152= 88  -->
  <!-- x: 2021=140, 2022=236, 2023=332, 2024=428, 2025=524, 2026=620 -->

  <!-- Area fill under the line -->
  <polygon points="140,222 236,215 332,200 428,172 524,136 620,88 620,240 140,240" fill="#DBEAFE" opacity="0.4"/>

  <!-- Line -->
  <polyline points="140,222 236,215 332,200 428,172 524,136 620,88" stroke="#3B82F6" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- GenAI inflection point marker -->
  <line x1="332" y1="50" x2="332" y2="240" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="290" y="50" width="84" height="20" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="332" y="64" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400E" font-weight="bold">ChatGPT 등장</text>

  <!-- Data point circles -->
  <circle cx="140" cy="222" r="5" fill="#3B82F6" stroke="white" stroke-width="1.5"/>
  <circle cx="236" cy="215" r="5" fill="#3B82F6" stroke="white" stroke-width="1.5"/>
  <circle cx="332" cy="200" r="5" fill="#F59E0B" stroke="white" stroke-width="1.5"/>
  <circle cx="428" cy="172" r="5" fill="#3B82F6" stroke="white" stroke-width="1.5"/>
  <circle cx="524" cy="136" r="5" fill="#3B82F6" stroke="white" stroke-width="1.5"/>
  <circle cx="620" cy="88" r="5" fill="#10B981" stroke="white" stroke-width="1.5"/>

  <!-- Value labels -->
  <text x="140" y="214" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">$4.5B</text>
  <text x="236" y="207" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">$6.2B</text>
  <text x="332" y="192" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">$10B</text>
  <text x="428" y="164" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">$17B</text>
  <text x="524" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">$26B</text>
  <text x="620" y="80" text-anchor="middle" font-family="monospace" font-size="9" fill="#10B981" font-weight="bold">$38B</text>
  <text x="620" y="92" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">(전망)</text>

  <!-- X axis year labels -->
  <text x="140" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">2021</text>
  <text x="236" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">2022</text>
  <text x="332" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#F59E0B" font-weight="bold">2023</text>
  <text x="428" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">2024</text>
  <text x="524" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">2025</text>
  <text x="620" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#10B981">2026</text>

  <!-- Phase labels -->
  <rect x="108" y="272" width="108" height="18" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="162" y="285" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">기반 구축기</text>

  <rect x="284" y="272" width="96" height="18" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="332" y="285" text-anchor="middle" font-family="monospace" font-size="8" fill="#92400E">전환점</text>

  <rect x="396" y="272" width="236" height="18" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="514" y="285" text-anchor="middle" font-family="monospace" font-size="8" fill="#065F46">스케일 확장기</text>
</svg>
