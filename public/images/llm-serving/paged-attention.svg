  </defs>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#374151">PagedAttention — 논리 블록과 물리 블록 매핑</text>

  <!-- ─── LEFT: Logical View (Req A) ─── -->
  <text x="160" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">요청 A (논리 뷰)</text>
  <rect x="40" y="60" width="70" height="36" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="75" y="83" text-anchor="middle" font-size="10" fill="#374151">논리 0</text>
  <rect x="115" y="60" width="70" height="36" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="150" y="83" text-anchor="middle" font-size="10" fill="#374151">논리 1</text>
  <rect x="190" y="60" width="70" height="36" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="225" y="83" text-anchor="middle" font-size="10" fill="#374151">논리 2</text>
  <text x="160" y="115" text-anchor="middle" font-size="9" fill="#6B7280">연속적으로 보임 (모델 관점)</text>

  <!-- ─── LEFT: Logical View (Req B) ─── -->
  <text x="160" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">요청 B (논리 뷰)</text>
  <rect x="40" y="156" width="70" height="36" rx="4" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="75" y="179" text-anchor="middle" font-size="10" fill="#374151">논리 0</text>
  <rect x="115" y="156" width="70" height="36" rx="4" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="150" y="179" text-anchor="middle" font-size="10" fill="#374151">논리 1</text>
  <text x="160" y="211" text-anchor="middle" font-size="9" fill="#6B7280">연속적으로 보임 (모델 관점)</text>

  <!-- ─── MIDDLE: Block Table ─── -->
  <rect x="272" y="46" width="170" height="200" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="357" y="67" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">블록 테이블</text>
  <text x="357" y="82" text-anchor="middle" font-size="9" fill="#6B7280">(논리 → 물리 매핑)</text>

  <!-- Table header -->
  <rect x="282" y="88" width="70" height="22" rx="2" fill="#E5E7EB"/>
  <text x="317" y="103" text-anchor="middle" font-size="9" font-weight="bold" fill="#374151">논리</text>
  <rect x="356" y="88" width="76" height="22" rx="2" fill="#E5E7EB"/>
  <text x="394" y="103" text-anchor="middle" font-size="9" font-weight="bold" fill="#374151">물리</text>

