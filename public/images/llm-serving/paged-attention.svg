<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#374151"/>
    </marker>
    <marker id="arr-share" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#059669"/>
