  <line x1="310" y1="116" x2="310" y2="132" stroke="#D1D5DB" stroke-width="1"/>
  <text x="360" y="124" text-anchor="middle" font-size="9" fill="#374151">Phys #3</text>
  <line x1="282" y1="132" x2="432" y2="132" stroke="#E5E7EB" stroke-width="1"/>

  <text x="286" y="148" font-size="9" fill="#7C3AED">A-1</text>
  <line x1="310" y1="140" x2="310" y2="156" stroke="#D1D5DB" stroke-width="1"/>
  <text x="360" y="148" text-anchor="middle" font-size="9" fill="#374151">Phys #7</text>
  <line x1="282" y1="156" x2="432" y2="156" stroke="#E5E7EB" stroke-width="1"/>

  <text x="286" y="172" font-size="9" fill="#7C3AED">A-2</text>
  <line x1="310" y1="164" x2="310" y2="180" stroke="#D1D5DB" stroke-width="1"/>
  <text x="360" y="172" text-anchor="middle" font-size="9" fill="#374151">Phys #1</text>
  <line x1="282" y1="180" x2="432" y2="180" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Req B rows -->
  <text x="286" y="196" font-size="9" fill="#D97706">B-0</text>
  <line x1="310" y1="188" x2="310" y2="204" stroke="#D1D5DB" stroke-width="1"/>
  <text x="360" y="196" text-anchor="middle" font-size="9" fill="#374151">Phys #5</text>
  <line x1="282" y1="204" x2="432" y2="204" stroke="#E5E7EB" stroke-width="1"/>

  <text x="286" y="220" font-size="9" fill="#D97706">B-1</text>
  <line x1="310" y1="212" x2="310" y2="228" stroke="#D1D5DB" stroke-width="1"/>
  <text x="360" y="220" text-anchor="middle" font-size="9" fill="#374151">Phys #3 ★</text>

  <!-- ─── RIGHT: Physical GPU Memory ─── -->
  <text x="620" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">물리 GPU 메모리</text>

  <rect x="530" y="60" width="80" height="36" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="570" y="78" text-anchor="middle" font-size="9" fill="#374151">Phys #1</text>
  <text x="570" y="90" text-anchor="middle" font-size="8" fill="#7C3AED">A-2</text>

  <rect x="530" y="104" width="80" height="36" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="570" y="128" text-anchor="middle" font-size="9" fill="#9CA3AF">Phys #2 (빈)</text>

  <rect x="530" y="148" width="80" height="36" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="570" y="166" text-anchor="middle" font-size="9" fill="#374151">Phys #3 ★</text>
  <text x="570" y="178" text-anchor="middle" font-size="8" fill="#059669">A-0 / B-1 공유</text>

  <rect x="530" y="192" width="80" height="36" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="570" y="216" text-anchor="middle" font-size="9" fill="#9CA3AF">Phys #4 (빈)</text>

  <rect x="530" y="236" width="80" height="36" rx="4" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
  <text x="570" y="254" text-anchor="middle" font-size="9" fill="#374151">Phys #5</text>
  <text x="570" y="266" text-anchor="middle" font-size="8" fill="#D97706">B-0</text>

  <rect x="626" y="60" width="80" height="36" rx="4" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="666" y="84" text-anchor="middle" font-size="9" fill="#9CA3AF">Phys #6 (빈)</text>

  <rect x="626" y="104" width="80" height="36" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="666" y="122" text-anchor="middle" font-size="9" fill="#374151">Phys #7</text>
  <text x="666" y="134" text-anchor="middle" font-size="8" fill="#7C3AED">A-1</text>

  <!-- Logical → Block Table arrows -->
  <line x1="260" y1="78" x2="272" y2="120" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="185" y1="174" x2="272" y2="192" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Block Table → Physical block arrows -->
  <!-- A-0 (y≈120) → Phys #3 (x=530, y=148~184, center y=166) — green (shared) -->
  <line x1="432" y1="120" x2="530" y2="166" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- A-1 (y≈144) → Phys #7 (x=626, y=104~140, center y=122) — purple -->
  <line x1="432" y1="144" x2="626" y2="122" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <!-- A-2 (y≈168) → Phys #1 (x=530, y=60~96, center y=78) — purple -->
  <line x1="432" y1="168" x2="530" y2="78" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <!-- B-0 (y≈192) → Phys #5 (x=530, y=236~272, center y=254) — orange -->
  <line x1="432" y1="192" x2="530" y2="254" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <!-- B-1 (y≈216) → Phys #3 (x=530, y=148~184, center y=166) — green (shared) -->
  <line x1="432" y1="216" x2="530" y2="166" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ─── BOTTOM: Copy-on-Write note ─── -->
  <rect x="20" y="268" width="720" height="42" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="380" y="285" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">★ 공유 블록(Phys #3) — Prefix Caching의 원리</text>
  <text x="380" y="301" text-anchor="middle" font-size="10" fill="#6B7280">시스템 프롬프트 등 공통 접두어는 Copy-on-Write로 물리 블록 1개를 여러 요청이 공유 → 메모리 절감</text>
</svg>
