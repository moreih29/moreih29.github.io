<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" fill="none">
  <!-- Background transparent -->

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">ReAct 루프: Thought → Action → Observation</text>

  <!-- Boxes -->
  <!-- Thought -->
  <rect x="40" y="60" width="160" height="60" rx="8" fill="#EDE9FE" stroke="#374151" stroke-width="1.5"/>
  <text x="120" y="86" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151" font-weight="bold">Thought</text>
  <text x="120" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">내부 추론</text>

  <!-- Action -->
  <rect x="270" y="60" width="160" height="60" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="350" y="86" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151" font-weight="bold">Action</text>
  <text x="350" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">외부 도구 호출</text>

  <!-- Observation -->
  <rect x="500" y="60" width="160" height="60" rx="8" fill="#FEF3C7" stroke="#374151" stroke-width="1.5"/>
  <text x="580" y="86" text-anchor="middle" font-family="monospace" font-size="12" fill="#374151" font-weight="bold">Observation</text>
  <text x="580" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">결과 수신</text>

  <!-- Arrows: Thought → Action -->
  <line x1="200" y1="90" x2="268" y2="90" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrows: Action → Observation -->
  <line x1="430" y1="90" x2="498" y2="90" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Curved return arrow: Observation → Thought (bottom curve) -->
  <path d="M 580 120 Q 580 175 350 175 Q 120 175 120 120" stroke="#374151" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Loop label -->
  <text x="350" y="195" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">피드백 루프 (다음 Thought로)</text>

  <!-- External Tool box -->
  <rect x="270" y="145" width="160" height="34" rx="6" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="350" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">검색 / 계산기 / API</text>

  <!-- Action ↔ External -->
  <line x1="350" y1="120" x2="350" y2="145" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151" opacity="0.6"/>
    </marker>
  </defs>
</svg>
