<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#374151">추론 능력 획득의 세 경로</text>

  <!-- PATH 1: PRM + RL (top) -->
  <rect x="20" y="48" width="680" height="88" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="36" y="68" font-size="12" font-weight="bold" fill="#374151">① PRM + RL — 단계별 감독으로 훈련</text>

  <!-- Base LM -->
  <rect x="40" y="80" width="80" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="96" text-anchor="middle" font-size="11" fill="#374151">기반</text>
  <text x="80" y="111" text-anchor="middle" font-size="11" fill="#374151">모델</text>

  <line x1="120" y1="100" x2="150" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- PRM box -->
  <rect x="152" y="80" width="100" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="202" y="96" text-anchor="middle" font-size="11" fill="#374151">PRM</text>
  <text x="202" y="111" text-anchor="middle" font-size="10" fill="#6B7280">단계별 검증</text>

  <line x1="252" y1="100" x2="282" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- RL -->
  <rect x="284" y="80" width="80" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="324" y="96" text-anchor="middle" font-size="11" fill="#374151">RL</text>
  <text x="324" y="111" text-anchor="middle" font-size="10" fill="#6B7280">정책 업데이트</text>

  <line x1="364" y1="100" x2="394" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Result -->
  <rect x="396" y="80" width="130" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="461" y="96" text-anchor="middle" font-size="11" fill="#374151">추론 모델</text>
  <text x="461" y="111" text-anchor="middle" font-size="10" fill="#6B7280">단계별 오류 감지</text>

  <text x="620" y="98" text-anchor="middle" font-size="10" fill="#6B7280">예: o-시리즈</text>
  <text x="620" y="112" text-anchor="middle" font-size="10" fill="#6B7280">(비공개)</text>

  <!-- PATH 2: RLVR (middle) -->
  <rect x="20" y="152" width="680" height="88" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="36" y="172" font-size="12" font-weight="bold" fill="#374151">② RLVR — 검증기의 이진 신호로 순수 RL</text>

  <!-- Base LM -->
  <rect x="40" y="184" width="80" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="200" text-anchor="middle" font-size="11" fill="#374151">기반</text>
  <text x="80" y="215" text-anchor="middle" font-size="11" fill="#374151">모델</text>

  <line x1="120" y1="204" x2="150" y2="204" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- GRPO box -->
  <rect x="152" y="184" width="130" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="217" y="200" text-anchor="middle" font-size="11" fill="#374151">GRPO</text>
  <text x="217" y="215" text-anchor="middle" font-size="10" fill="#6B7280">SFT 없이 순수 RL</text>

  <line x1="282" y1="204" x2="312" y2="204" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Verifier -->
  <rect x="314" y="184" width="130" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="379" y="200" text-anchor="middle" font-size="11" fill="#374151">검증기 보상</text>
  <text x="379" y="215" text-anchor="middle" font-size="10" fill="#6B7280">정답 ✓ / 오답 ✗</text>

  <line x1="444" y1="204" x2="474" y2="204" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Result -->
  <rect x="476" y="184" width="130" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="541" y="200" text-anchor="middle" font-size="11" fill="#374151">추론 모델</text>
  <text x="541" y="215" text-anchor="middle" font-size="10" fill="#6B7280">자기 반성 자발적 발현</text>

  <text x="650" y="200" text-anchor="middle" font-size="10" fill="#6B7280">R1-Zero</text>

  <!-- PATH 3: Distillation (bottom) -->
  <rect x="20" y="256" width="680" height="88" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="36" y="276" font-size="12" font-weight="bold" fill="#374151">③ 추론 증류 — 대형 모델의 사고 과정을 소형 모델로</text>

  <!-- Teacher -->
  <rect x="40" y="288" width="90" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="85" y="304" text-anchor="middle" font-size="11" fill="#374151">Teacher</text>
  <text x="85" y="319" text-anchor="middle" font-size="10" fill="#6B7280">R1-671B</text>

  <line x1="130" y1="308" x2="160" y2="308" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- CoT data -->
  <rect x="162" y="288" width="120" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="222" y="304" text-anchor="middle" font-size="11" fill="#374151">긴 CoT 데이터</text>
  <text x="222" y="319" text-anchor="middle" font-size="10" fill="#6B7280">사고 과정 포함</text>

  <line x1="282" y1="308" x2="312" y2="308" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- SFT -->
  <rect x="314" y="288" width="80" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="354" y="308" text-anchor="middle" font-size="11" fill="#374151">SFT만으로</text>

  <line x1="394" y1="308" x2="424" y2="308" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Student -->
  <rect x="426" y="288" width="130" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="491" y="304" text-anchor="middle" font-size="11" fill="#374151">Student 추론 모델</text>
  <text x="491" y="319" text-anchor="middle" font-size="10" fill="#6B7280">7B~32B, RL 없이</text>

  <text x="620" y="304" text-anchor="middle" font-size="10" fill="#6B7280">R1-Distill</text>
  <text x="620" y="318" text-anchor="middle" font-size="10" fill="#6B7280">Qwen/LLaMA</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
