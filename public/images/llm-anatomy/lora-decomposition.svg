<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" fill="none">
  <!-- Title -->
  <text x="380" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">LoRA: 저차원 분해 (Low-Rank Decomposition)</text>

  <!-- W0 large matrix -->
  <g transform="translate(30, 60)">
    <rect x="0" y="20" width="120" height="160" rx="4" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <!-- Grid lines to suggest matrix -->
    <line x1="0" y1="60" x2="120" y2="60" stroke="#93C5FD" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#93C5FD" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="120" y2="140" stroke="#93C5FD" stroke-width="0.5"/>
    <line x1="40" y1="20" x2="40" y2="180" stroke="#93C5FD" stroke-width="0.5"/>
    <line x1="80" y1="20" x2="80" y2="180" stroke="#93C5FD" stroke-width="0.5"/>
    <text x="60" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1E40AF" text-anchor="middle">W&#8320;</text>
    <!-- Dimensions -->
    <text x="60" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">k</text>
    <text x="-10" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">d</text>
    <!-- Lock icon text -->
    <text x="60" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">원본 가중치</text>
    <text x="60" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#DC2626" text-anchor="middle">(고정)</text>
  </g>

  <!-- Plus sign -->
  <text x="190" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#374151" text-anchor="middle">+</text>

  <!-- LoRA matrices B and A -->
  <g transform="translate(220, 60)">
    <!-- B matrix (d x r) - tall and narrow -->
    <rect x="0" y="20" width="36" height="160" rx="4" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
    <line x1="0" y1="60" x2="36" y2="60" stroke="#86EFAC" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="36" y2="100" stroke="#86EFAC" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="36" y2="140" stroke="#86EFAC" stroke-width="0.5"/>
    <text x="18" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">B</text>
    <text x="18" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">r</text>
    <text x="-10" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">d</text>

    <!-- Multiply sign -->
    <text x="53" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#374151" text-anchor="middle">x</text>

    <!-- A matrix (r x k) - short and wide -->
    <rect x="68" y="65" width="120" height="36" rx="4" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
    <line x1="108" y1="65" x2="108" y2="101" stroke="#86EFAC" stroke-width="0.5"/>
    <line x1="148" y1="65" x2="148" y2="101" stroke="#86EFAC" stroke-width="0.5"/>
    <text x="128" y="89" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">A</text>
    <text x="128" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">k</text>
    <text x="60" y="89" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">r</text>

    <!-- Label -->
    <text x="94" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">LoRA 어댑터</text>
    <text x="94" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#22C55E" text-anchor="middle">(학습)</text>
  </g>

  <!-- Equals sign -->
  <text x="430" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#374151" text-anchor="middle">=</text>

  <!-- Result matrix -->
  <g transform="translate(460, 60)">
    <rect x="0" y="20" width="120" height="160" rx="4" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="60" x2="120" y2="60" stroke="#C4B5FD" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#C4B5FD" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="120" y2="140" stroke="#C4B5FD" stroke-width="0.5"/>
    <line x1="40" y1="20" x2="40" y2="180" stroke="#C4B5FD" stroke-width="0.5"/>
    <line x1="80" y1="20" x2="80" y2="180" stroke="#C4B5FD" stroke-width="0.5"/>
    <text x="60" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#6D28D9" text-anchor="middle">W&#8320; + BA</text>
    <text x="60" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">추론 시 병합</text>
  </g>

  <!-- Rank annotation -->
  <g transform="translate(100, 270)">
    <rect x="0" y="0" width="560" height="90" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

    <text x="20" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#374151">핵심: r &lt;&lt; d, k</text>
    <text x="20" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">원본 파라미터 수:</text>
    <text x="160" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#374151">d x k = 1,024 x 1,024 = 1,048,576</text>
    <text x="20" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">LoRA 파라미터 수:</text>
    <text x="160" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#22C55E">d x r + r x k = 1,024 x 8 + 8 x 1,024 = 16,384 (1.6%)</text>
  </g>
</svg>