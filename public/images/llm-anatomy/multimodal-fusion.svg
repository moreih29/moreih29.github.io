<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" fill="none">
  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">Late Fusion vs Early Fusion</text>

  <!-- ===== Late Fusion (Left) ===== -->
  <text x="175" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">Late Fusion</text>

  <!-- Vision Encoder -->
  <rect x="30" y="65" width="100" height="36" rx="6" fill="#FEF3C7" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="87" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">비전 인코더</text>

  <!-- Image input -->
  <rect x="30" y="120" width="100" height="30" rx="6" fill="#E5E7EB" stroke="#374151" stroke-width="1"/>
  <text x="80" y="139" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">이미지 토큰</text>

  <!-- Text input -->
  <rect x="30" y="162" width="100" height="30" rx="6" fill="#E5E7EB" stroke="#374151" stroke-width="1"/>
  <text x="80" y="181" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">텍스트 토큰</text>

  <!-- Adapter -->
  <rect x="155" y="112" width="70" height="36" rx="6" fill="#FDE8D8" stroke="#374151" stroke-width="1.5"/>
  <text x="190" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">어댑터</text>
  <text x="190" y="141" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">(MLP)</text>

  <!-- LLM Late -->
  <rect x="248" y="100" width="70" height="80" rx="6" fill="#C4B5FD" stroke="#374151" stroke-width="1.5"/>
  <text x="283" y="137" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">LLM</text>
  <text x="283" y="152" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">후단</text>
  <text x="283" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">처리</text>

  <!-- Arrows late fusion -->
  <line x1="130" y1="83" x2="153" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#bf)"/>
  <line x1="130" y1="135" x2="153" y2="132" stroke="#374151" stroke-width="1.5" marker-end="url(#bf)"/>
  <line x1="130" y1="177" x2="248" y2="165" stroke="#374151" stroke-width="1.5" marker-end="url(#bf)"/>
  <line x1="225" y1="130" x2="246" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#bf)"/>

  <!-- Divider -->
  <line x1="350" y1="44" x2="350" y2="220" stroke="#374151" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ===== Early Fusion (Right) ===== -->
  <text x="525" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">Early Fusion</text>

  <!-- Shared tokenizer -->
  <rect x="375" y="100" width="110" height="36" rx="6" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="430" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">통합 토크나이저</text>
  <text x="430" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">텍스트+이미지+오디오</text>

  <!-- Unified Transformer -->
  <rect x="518" y="80" width="100" height="110" rx="8" fill="#A5B4FC" stroke="#374151" stroke-width="1.5"/>
  <text x="568" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">단일</text>
  <text x="568" y="122" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">Transformer</text>
  <text x="568" y="142" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">처음부터</text>
  <text x="568" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">통합 학습</text>
  <text x="568" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">풍부한 상호작용</text>

  <!-- Input tokens (Early) -->
  <rect x="375" y="158" width="45" height="26" rx="4" fill="#FEF3C7" stroke="#374151" stroke-width="1"/>
  <text x="397" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">이미지</text>

  <rect x="430" y="158" width="55" height="26" rx="4" fill="#E5E7EB" stroke="#374151" stroke-width="1"/>
  <text x="457" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">텍스트</text>

  <!-- Arrows early fusion -->
  <line x1="485" y1="118" x2="516" y2="118" stroke="#374151" stroke-width="1.5" marker-end="url(#bf)"/>
  <line x1="397" y1="158" x2="430" y2="136" stroke="#374151" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#bf)"/>
  <line x1="457" y1="158" x2="445" y2="136" stroke="#374151" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#bf)"/>

  <!-- Labels -->
  <text x="175" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">모달리티별 인코더 → LLM 매핑</text>
  <text x="525" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">모든 모달리티를 단일 공간에서 학습</text>

  <defs>
    <marker id="bf" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
