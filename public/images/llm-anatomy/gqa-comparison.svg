<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" fill="none">
  <!-- MHA Section -->
  <g transform="translate(10, 0)">
    <text x="115" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#374151" text-anchor="middle">MHA</text>
    <text x="115" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">(품질 최대, 캐시 최대)</text>
    <!-- Q heads -->
    <text x="16" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">Query</text>
    <rect x="10" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="30" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q1</text>
    <rect x="60" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="80" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q2</text>
    <rect x="110" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="130" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q3</text>
    <rect x="160" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="180" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q4</text>
    <!-- Lines -->
    <line x1="30" y1="118" x2="30" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="80" y1="118" x2="80" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="130" y1="118" x2="130" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="180" y1="118" x2="180" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <!-- KV heads -->
    <text x="16" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">K/V</text>
    <rect x="10" y="200" width="40" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="30" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">KV1</text>
    <rect x="60" y="200" width="40" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="80" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">KV2</text>
    <rect x="110" y="200" width="40" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="130" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">KV3</text>
    <rect x="160" y="200" width="40" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="180" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">KV4</text>
    <!-- Label -->
    <text x="115" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">1:1 매핑</text>
    <text x="115" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">H개의 KV head</text>
  </g>

  <!-- Divider 1 -->
  <line x1="260" y1="60" x2="260" y2="290" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- GQA Section -->
  <g transform="translate(280, 0)">
    <text x="105" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#374151" text-anchor="middle">GQA</text>
    <text x="105" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">(절충)</text>
    <!-- Q heads -->
    <text x="16" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">Query</text>
    <rect x="10" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="30" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q1</text>
    <rect x="60" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="80" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q2</text>
    <rect x="110" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="130" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q3</text>
    <rect x="160" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="180" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q4</text>
    <!-- Lines: Q1,Q2 -> KV1; Q3,Q4 -> KV2 -->
    <line x1="30" y1="118" x2="55" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="80" y1="118" x2="55" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="130" y1="118" x2="155" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="180" y1="118" x2="155" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <!-- Group brackets -->
    <rect x="5" y="88" width="100" height="32" rx="6" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="105" y="88" width="100" height="32" rx="6" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="55" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle">그룹 1</text>
    <text x="155" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7C3AED" text-anchor="middle">그룹 2</text>
    <!-- KV heads -->
    <text x="16" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">K/V</text>
    <rect x="35" y="200" width="40" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="55" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">KV1</text>
    <rect x="135" y="200" width="40" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="155" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">KV2</text>
    <!-- Label -->
    <text x="105" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">2:1 매핑 (G=2)</text>
    <text x="105" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">G개의 KV head</text>
  </g>

  <!-- Divider 2 -->
  <line x1="510" y1="60" x2="510" y2="290" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- MQA Section -->
  <g transform="translate(530, 0)">
    <text x="115" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#374151" text-anchor="middle">MQA</text>
    <text x="115" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">(캐시 최소)</text>
    <!-- Q heads -->
    <text x="16" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">Query</text>
    <rect x="10" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="30" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q1</text>
    <rect x="60" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="80" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q2</text>
    <rect x="110" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="130" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q3</text>
    <rect x="160" y="90" width="40" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="180" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="600">Q4</text>
    <!-- Lines: all Q -> single KV -->
    <line x1="30" y1="118" x2="105" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="80" y1="118" x2="105" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="130" y1="118" x2="105" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <line x1="180" y1="118" x2="105" y2="200" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <!-- KV head -->
    <text x="16" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">K/V</text>
    <rect x="85" y="200" width="40" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="105" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706" text-anchor="middle" font-weight="600">KV1</text>
    <!-- Label -->
    <text x="115" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">H:1 매핑</text>
    <text x="115" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">1개의 KV head</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(0, 310)">
    <rect x="180" y="10" width="420" height="90" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="200" y="30" width="14" height="14" rx="2" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
    <text x="222" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151">Query Head</text>
    <rect x="340" y="30" width="14" height="14" rx="2" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
    <text x="362" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151">Key/Value Head</text>
    <text x="390" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">KV head 수가 줄수록 캐시 메모리가 감소하고 추론 속도가 향상됨</text>
  </g>
</svg>