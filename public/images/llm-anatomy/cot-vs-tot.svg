<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" fill="none">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#374151"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#EF4444"/>
    </marker>
    <marker id="arr-back" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Left: CoT -->
  <g transform="translate(20, 0)">
    <text x="160" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">Chain-of-Thought</text>
    <text x="160" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">(선형)</text>

    <!-- Question -->
    <rect x="100" y="70" width="120" height="40" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="160" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">질문</text>

    <path d="M160 110 L160 140" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Step 1 -->
    <rect x="100" y="145" width="120" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="160" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534" text-anchor="middle">단계 1</text>

    <path d="M160 181 L160 205" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Step 2 -->
    <rect x="100" y="210" width="120" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="160" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534" text-anchor="middle">단계 2</text>

    <path d="M160 246 L160 270" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Step 3 -->
    <rect x="100" y="275" width="120" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="160" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#166534" text-anchor="middle">단계 3</text>

    <path d="M160 311 L160 335" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Answer -->
    <rect x="100" y="340" width="120" height="40" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="160" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">답</text>

    <!-- Annotation -->
    <text x="160" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">단일 경로, 역추적 없음</text>
  </g>

  <!-- Divider -->
  <line x1="370" y1="50" x2="370" y2="420" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right: ToT -->
  <g transform="translate(400, 0)">
    <text x="170" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">Tree of Thoughts</text>
    <text x="170" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">(탐색 + 역추적)</text>

    <!-- Question -->
    <rect x="110" y="70" width="120" height="40" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="170" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">질문</text>

    <!-- Branches from question -->
    <path d="M140 110 L70 145" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <path d="M170 110 L170 145" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <path d="M200 110 L270 145" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- Level 1 nodes -->
    <rect x="25" y="148" width="90" height="32" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="70" y="169" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534" text-anchor="middle">사고 A</text>

    <rect x="125" y="148" width="90" height="32" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="170" y="169" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#166534" text-anchor="middle">사고 B</text>

    <rect x="225" y="148" width="90" height="32" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
    <text x="270" y="169" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#DC2626" text-anchor="middle">사고 C</text>
    <!-- X mark on pruned -->
    <text x="305" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#EF4444">X</text>

    <!-- Branches from A -->
    <path d="M50 180 L30 215" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <path d="M90 180 L110 215" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- Branches from B -->
    <path d="M160 180 L190 215" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <path d="M180 180 L250 215" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- Level 2 nodes -->
    <rect x="0" y="218" width="60" height="28" rx="5" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
    <text x="30" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#DC2626" text-anchor="middle">A1</text>
    <text x="56" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#EF4444">X</text>

    <rect x="80" y="218" width="60" height="28" rx="5" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="110" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#166534" text-anchor="middle">A2</text>

    <rect x="160" y="218" width="60" height="28" rx="5" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="190" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#166534" text-anchor="middle">B1</text>

    <rect x="230" y="218" width="60" height="28" rx="5" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
    <text x="260" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#DC2626" text-anchor="middle">B2</text>
    <text x="286" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#EF4444">X</text>

    <!-- Backtracking arrow from B2 area back up -->
    <path d="M270 248 C290 270, 310 210, 290 185 L285 187" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arr-back)"/>
    <text x="318" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7C3AED">역추적</text>

    <!-- Continue from A2 and B1 -->
    <path d="M110 246 L110 275" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
    <path d="M190 246 L190 275" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>

    <!-- Level 3 nodes -->
    <rect x="80" y="278" width="60" height="28" rx="5" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="110" y="297" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#166534" text-anchor="middle">A2-1</text>

    <rect x="160" y="278" width="60" height="28" rx="5" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="190" y="297" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#166534" text-anchor="middle">B1-1</text>

    <!-- Evaluation: select best -->
    <path d="M110 306 L140 340" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,3"/>
    <path d="M190 306 L160 340" stroke="#22C55E" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Answer -->
    <rect x="110" y="340" width="120" height="40" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="170" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1E40AF" text-anchor="middle" font-weight="600">최선의 답</text>

    <!-- Annotation -->
    <text x="170" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">다중 경로 탐색, 가지치기 + 역추적</text>
  </g>

  <!-- Legend -->
  <g transform="translate(200, 425)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
    <text x="20" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">유망한 경로</text>
    <rect x="120" y="0" width="14" height="14" rx="3" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2"/>
    <text x="140" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">가지치기됨 (X)</text>
    <line x1="270" y1="7" x2="300" y2="7" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text x="306" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">역추적</text>
  </g>
</svg>