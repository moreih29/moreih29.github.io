<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#374151">Speculative Decoding — Draft-then-Verify 패턴</text>

  <!-- Phase 1: Draft -->
  <rect x="20" y="48" width="680" height="90" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="36" y="68" font-size="12" font-weight="bold" fill="#374151">① Draft 단계 — 소형 모델이 k개 토큰을 순차 생성</text>

  <!-- Draft model -->
  <rect x="36" y="78" width="100" height="44" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="86" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">Draft</text>
  <text x="86" y="112" text-anchor="middle" font-size="10" fill="#6B7280">소형 모델</text>

  <!-- Arrow draft → tokens -->
  <line x1="136" y1="100" x2="156" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Draft tokens -->
  <rect x="158" y="80" width="52" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="184" y="95" text-anchor="middle" font-size="11" fill="#374151">t̃₁</text>
  <text x="184" y="110" text-anchor="middle" font-size="9" fill="#6B7280">draft</text>

  <line x1="210" y1="100" x2="224" y2="100" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="226" y="80" width="52" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="252" y="95" text-anchor="middle" font-size="11" fill="#374151">t̃₂</text>
  <text x="252" y="110" text-anchor="middle" font-size="9" fill="#6B7280">draft</text>

  <line x1="278" y1="100" x2="292" y2="100" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="294" y="80" width="52" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="320" y="95" text-anchor="middle" font-size="11" fill="#374151">t̃₃</text>
  <text x="320" y="110" text-anchor="middle" font-size="9" fill="#6B7280">draft</text>

  <line x1="346" y1="100" x2="360" y2="100" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="362" y="80" width="52" height="40" rx="4" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="388" y="95" text-anchor="middle" font-size="11" fill="#374151">t̃₄</text>
  <text x="388" y="110" text-anchor="middle" font-size="9" fill="#6B7280">draft</text>

  <text x="438" y="102" text-anchor="middle" font-size="20" fill="#9CA3AF">→</text>
  <text x="470" y="96" text-anchor="middle" font-size="11" fill="#6B7280">k=4개</text>
  <text x="470" y="110" text-anchor="middle" font-size="11" fill="#6B7280">순차 생성</text>

  <!-- Phase 2: Verify -->
  <rect x="20" y="152" width="680" height="100" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="36" y="172" font-size="12" font-weight="bold" fill="#374151">② Verify 단계 — 대형 모델이 k+1개 토큰을 한 번에 병렬 평가</text>

  <!-- Target model -->
  <rect x="36" y="182" width="100" height="44" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="86" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">Target</text>
  <text x="86" y="216" text-anchor="middle" font-size="10" fill="#6B7280">대형 모델</text>

  <line x1="136" y1="204" x2="156" y2="204" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Accepted token -->
  <rect x="158" y="184" width="52" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="184" y="199" text-anchor="middle" font-size="11" fill="#374151">t̃₁</text>
  <text x="184" y="214" text-anchor="middle" font-size="9" fill="#374151">수용 ✓</text>

  <line x1="210" y1="204" x2="224" y2="204" stroke="#374151" stroke-width="1"/>

  <!-- Accepted -->
  <rect x="226" y="184" width="52" height="40" rx="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="252" y="199" text-anchor="middle" font-size="11" fill="#374151">t̃₂</text>
  <text x="252" y="214" text-anchor="middle" font-size="9" fill="#374151">수용 ✓</text>

  <line x1="278" y1="204" x2="292" y2="204" stroke="#374151" stroke-width="1"/>

  <!-- Rejected token -->
  <rect x="294" y="184" width="52" height="40" rx="4" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="320" y="199" text-anchor="middle" font-size="11" fill="#374151">t̃₃</text>
  <text x="320" y="214" text-anchor="middle" font-size="9" fill="#EF4444">거부 ✗</text>

  <!-- Resampled token -->
  <rect x="362" y="184" width="52" height="40" rx="4" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="388" y="199" text-anchor="middle" font-size="11" fill="#374151">t₃'</text>
  <text x="388" y="214" text-anchor="middle" font-size="9" fill="#22C55E">재샘플 ↺</text>

  <text x="460" y="196" text-anchor="middle" font-size="10" fill="#6B7280">병렬 평가</text>
  <text x="460" y="210" text-anchor="middle" font-size="10" fill="#6B7280">(단 1회 forward)</text>

  <!-- Result bar -->
  <rect x="20" y="264" width="680" height="28" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="360" y="283" text-anchor="middle" font-size="11" fill="#374151">출력 분포가 Target 모델 단독 사용과 수학적으로 동치 — 정확도 손실 없는 가속 (2~3×)</text>

  <defs>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
