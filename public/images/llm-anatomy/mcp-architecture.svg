<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" fill="none">
  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">MCP 아키텍처: M+N 통합 모델</text>

  <!-- MCP Host box -->
  <rect x="20" y="44" width="220" height="180" rx="10" fill="#EDE9FE" stroke="#374151" stroke-width="1.5"/>
  <text x="130" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">MCP Host</text>
  <text x="130" y="82" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">(Claude Desktop, IDE 등)</text>

  <!-- LLM inside host -->
  <rect x="40" y="95" width="80" height="40" rx="6" fill="#C4B5FD" stroke="#374151" stroke-width="1"/>
  <text x="80" y="119" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">LLM</text>

  <!-- MCP Client inside host -->
  <rect x="140" y="95" width="80" height="40" rx="6" fill="#A5B4FC" stroke="#374151" stroke-width="1"/>
  <text x="180" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">MCP</text>
  <text x="180" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">Client</text>

  <!-- LLM ↔ Client -->
  <line x1="120" y1="115" x2="140" y2="115" stroke="#374151" stroke-width="1.5" marker-end="url(#a1)" marker-start="url(#a1r)"/>

  <!-- Protocol label -->
  <text x="130" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">JSON-RPC 2.0</text>
  <text x="130" y="173" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">stdio / SSE</text>

  <!-- Arrow: Client → MCP Servers -->
  <line x1="240" y1="145" x2="310" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- MCP Servers group -->
  <!-- Server 1: Tools -->
  <rect x="310" y="50" width="160" height="60" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="390" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">MCP Server A</text>
  <text x="390" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Tools: 함수/액션</text>
  <text x="390" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Resources: 데이터</text>

  <!-- Server 2 -->
  <rect x="310" y="120" width="160" height="60" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="390" y="144" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">MCP Server B</text>
  <text x="390" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Tools: 검색/계산기</text>
  <text x="390" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Prompts: 템플릿</text>

  <!-- Server 3 -->
  <rect x="310" y="190" width="160" height="48" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="390" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">MCP Server N</text>
  <text x="390" y="228" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">... 추가 가능</text>

  <!-- Arrows: Client → each Server -->
  <line x1="240" y1="115" x2="308" y2="80" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a1)"/>
  <line x1="240" y1="155" x2="308" y2="215" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a1)"/>

  <!-- External services -->
  <rect x="500" y="60" width="150" height="40" rx="6" fill="#FEF3C7" stroke="#374151" stroke-width="1"/>
  <text x="575" y="80" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">파일시스템 / DB</text>
  <text x="575" y="94" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">외부 API</text>

  <rect x="500" y="130" width="150" height="40" rx="6" fill="#FEF3C7" stroke="#374151" stroke-width="1"/>
  <text x="575" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">검색엔진 / 웹</text>
  <text x="575" y="164" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">계산 도구</text>

  <line x1="470" y1="80" x2="498" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="470" y1="150" x2="498" y2="150" stroke="#374151" stroke-width="1.5" marker-end="url(#a1)"/>

  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#374151"/>
    </marker>
    <marker id="a1r" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L7,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
