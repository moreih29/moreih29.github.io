<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" fill="none">
  <defs>
    <marker id="arrGD" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arrGDBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrGDGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">Grounding DINO — Dual-Encoder Single-Decoder 아키텍처</text>

  <!-- ===== INPUTS ===== -->
  <!-- Image input -->
  <rect x="60" y="55" width="170" height="44" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="145" y="73" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1D4ED8" text-anchor="middle">이미지 입력</text>
  <text x="145" y="91" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">H × W × 3</text>

  <!-- Text input -->
  <rect x="670" y="55" width="170" height="44" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="755" y="73" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#059669" text-anchor="middle">텍스트 입력</text>
  <text x="755" y="91" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">"cat", "red car on left" …</text>

  <!-- Backbone arrows -->
  <line x1="145" y1="99" x2="145" y2="143" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGD)"/>
  <line x1="755" y1="99" x2="755" y2="143" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGD)"/>

  <!-- ===== ENCODERS ===== -->
  <!-- Image Backbone -->
  <rect x="55" y="143" width="180" height="60" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="145" y="167" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8" text-anchor="middle">Image Backbone</text>
  <text x="145" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">Swin Transformer</text>
  <text x="145" y="199" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">멀티스케일 시각 특징</text>

  <!-- Text Backbone -->
  <rect x="665" y="143" width="180" height="60" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="755" y="167" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">Text Backbone</text>
  <text x="755" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">BERT</text>
  <text x="755" y="199" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">언어 토큰 특징</text>

  <!-- Arrows to Feature Enhancer -->
  <line x1="235" y1="173" x2="325" y2="260" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrGDBlue)"/>
  <line x1="665" y1="173" x2="575" y2="260" stroke="#059669" stroke-width="1.5" marker-end="url(#arrGDGreen)"/>

  <!-- ===== FEATURE ENHANCER ===== -->
  <rect x="250" y="255" width="400" height="115" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="450" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6D28D9" text-anchor="middle">Feature Enhancer (6 layers)</text>

  <rect x="270" y="290" width="100" height="32" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="320" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Deformable</text>
  <text x="320" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Self-Attn (img)</text>

  <rect x="390" y="290" width="120" height="32" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="450" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Cross-Attn</text>
  <text x="450" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">img ↔ text</text>

  <rect x="530" y="290" width="100" height="32" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="580" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Vanilla</text>
  <text x="580" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Self-Attn (txt)</text>

  <text x="450" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">시각↔언어 양방향 융합 → 언어 유도 시각 특징 생성</text>

  <!-- Arrow down to Language-Guided Query Selection -->
  <line x1="450" y1="370" x2="450" y2="400" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGD)"/>

  <!-- ===== LANGUAGE-GUIDED QUERY SELECTION ===== -->
  <rect x="260" y="400" width="380" height="45" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#92400E" text-anchor="middle">Language-Guided Query Selection</text>
  <text x="450" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">텍스트 관련 이미지 영역 상위 K개 선택 → detector query 초기화</text>

  <!-- Arrow down to Decoder -->
  <line x1="450" y1="445" x2="450" y2="462" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGD)"/>

  <!-- ===== CROSS-MODALITY DECODER ===== -->
  <rect x="200" y="462" width="500" height="28" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#92400E" text-anchor="middle">Cross-Modality Decoder (6 layers) — box 정제 + 분류</text>

  <!-- Output -->
  <line x1="450" y1="490" x2="450" y2="500" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGD)"/>
  <rect x="280" y="498" width="340" height="28" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="450" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">Bounding Boxes + 텍스트 그라운딩 결과</text>

  <!-- Callout: zero-shot -->
  <rect x="30" y="450" width="195" height="55" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="127" y="469" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#059669" text-anchor="middle">Zero-shot 성능</text>
  <text x="127" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">COCO: 52.5 AP</text>
  <text x="127" y="499" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">ODinW: 26.1 mean AP</text>

  <!-- Callout: datasets -->
  <rect x="675" y="450" width="195" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="772" y="469" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400E" text-anchor="middle">학습 데이터</text>
  <text x="772" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Objects365 + OpenImages</text>
  <text x="772" y="499" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">GoldG + CC/SBU/YFCC</text>
</svg>
