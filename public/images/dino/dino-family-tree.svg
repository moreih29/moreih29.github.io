<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <marker id="arrFT" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arrBlueF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrGreenF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="bold" fill="#374151" text-anchor="middle">DINO 계보도 — 두 개의 독립 계열</text>

  <!-- Year axis -->
  <line x1="50" y1="55" x2="50" y2="435" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="50" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">2021</text>
  <text x="50" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">2022</text>
  <text x="50" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">2023</text>
  <text x="50" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">2024</text>
  <text x="50" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">2025</text>

  <!-- Tick marks -->
  <line x1="44" y1="85" x2="56" y2="85" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="44" y1="165" x2="56" y2="165" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="44" y1="245" x2="56" y2="245" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="44" y1="325" x2="56" y2="325" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="44" y1="405" x2="56" y2="405" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Column labels -->
  <rect x="90" y="48" width="360" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="270" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8" text-anchor="middle">SSL 계열 (Meta AI / INRIA) — self-DI stillation with NO labels</text>

  <rect x="480" y="48" width="390" height="28" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="675" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">Detection 계열 (IDEA Research) — DETR with Improved DeNoising</text>

  <!-- ===== SSL LINEAGE ===== -->

  <!-- DINO 2021 -->
  <rect x="90" y="72" width="340" height="68" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="145" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1D4ED8">DINO</text>
  <text x="145" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Caron et al. · ICCV 2021 · arXiv:2104.14294</text>
  <text x="145" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Student-Teacher + EMA · Multi-crop · Centering+Sharpening</text>
  <text x="145" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">ViT-B/16 80.1% · 자발적 segmentation</text>

  <!-- SSL arrow 1→2 -->
  <line x1="270" y1="140" x2="270" y2="163" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrBlueF)"/>

  <!-- DINOv2 2023 -->
  <rect x="90" y="163" width="340" height="68" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="145" y="181" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1D4ED8">DINOv2</text>
  <text x="145" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Oquab et al. · TMLR 2024 · arXiv:2304.07193</text>
  <text x="145" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">LVD-142M · DINO+iBOT+KoLeo · Sinkhorn-Knopp</text>
  <text x="145" y="227" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">ViT-g/14 86.5% · Foundation model for vision</text>

  <!-- SSL arrow 2→3 -->
  <line x1="270" y1="231" x2="270" y2="325" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrBlueF)"/>

  <!-- DINOv3 2025 -->
  <rect x="90" y="325" width="340" height="88" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="145" y="343" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6D28D9">DINOv3</text>
  <text x="145" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Meta AI · 2025 · arXiv:2508.10104</text>
  <text x="145" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">LVD-1689M · ViT-7B · Gram Anchoring</text>
  <text x="145" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Axial RoPE · SwiGLU FFN · 다단계 학습</text>
  <text x="145" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">88.4% · ADE20K 63.0 · COCO 66.1</text>

  <!-- ===== DETECTION LINEAGE ===== -->

  <!-- DINO-DETR 2022 -->
  <rect x="480" y="150" width="390" height="68" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="540" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#059669">DINO-DETR</text>
  <text x="540" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Zhang et al. · ICLR 2023 · arXiv:2203.03605</text>
  <text x="540" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Contrastive Denoising · Mixed Query Selection</text>
  <text x="540" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">R50 49.4 AP · SwinL 63.2 AP</text>

  <!-- Detection arrow 1→2 -->
  <line x1="675" y1="218" x2="675" y2="245" stroke="#059669" stroke-width="1.5" marker-end="url(#arrGreenF)"/>

  <!-- Grounding DINO 2023 -->
  <rect x="480" y="245" width="390" height="68" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="540" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#059669">Grounding DINO</text>
  <text x="540" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Liu et al. · ECCV 2024 · arXiv:2303.05499</text>
  <text x="540" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Open-set detection · Swin+BERT · Feature Enhancer</text>
  <text x="540" y="309" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280">COCO zero-shot 52.5 AP</text>

  <!-- Detection arrow 2→3 -->
  <line x1="675" y1="313" x2="675" y2="330" stroke="#059669" stroke-width="1.5" marker-end="url(#arrGreenF)"/>

  <!-- Grounding DINO 1.5 + DINO-X 2024 -->
  <rect x="480" y="330" width="185" height="68" rx="8" fill="#A7F3D0" stroke="#059669" stroke-width="1.5"/>
  <text x="572" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">GD 1.5</text>
  <text x="572" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Ren et al. · 2024</text>
  <text x="572" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Pro: LVIS 55.7 AP</text>
  <text x="572" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Edge: 75.2 FPS</text>

  <rect x="685" y="330" width="185" height="68" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="777" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6D28D9" text-anchor="middle">DINO-X</text>
  <text x="777" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Ren et al. · 2024</text>
  <text x="777" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Universal: 텍스트+시각</text>
  <text x="777" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">COCO 56.0 AP</text>

  <!-- Arrows from Grounding DINO to 1.5 / DINO-X -->
  <line x1="620" y1="313" x2="572" y2="330" stroke="#059669" stroke-width="1.5" marker-end="url(#arrGreenF)"/>
  <line x1="730" y1="313" x2="777" y2="330" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrFT)"/>

  <!-- Cross-line: SSL feeds into Detection (loose) -->
  <line x1="430" y1="270" x2="480" y2="270" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="455" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">이름만 공유</text>
  <text x="455" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">독립 계보</text>

  <!-- Legend -->
  <rect x="90" y="425" width="780" height="30" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="480" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">SSL DINO = self-DIstillation with NO labels (Meta AI)   ·   Detection DINO = DETR with Improved DeNoising (IDEA Research)</text>
</svg>
