<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" fill="none">
  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">DINOv3 — Gram Anchoring 메커니즘</text>

  <!-- Problem label -->
  <rect x="20" y="50" width="780" height="40" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="410" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#B91C1C" text-anchor="middle">문제: 대규모 장기 학습 시 dense feature map 열화 — iBOT 손실만으로 해결 불가</text>
  <text x="410" y="83" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">전역 의미 목적과 조밀한 특징 맵 품질이 충돌 → 공간 일관성 손상</text>

  <!-- Left: Student -->
  <rect x="30" y="120" width="190" height="160" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="125" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">현재 Student</text>
  <text x="125" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">패치 특징 행렬</text>

  <!-- Patch grid -->
  <rect x="50" y="175" width="30" height="30" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="65" y="194" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">p₁</text>
  <rect x="85" y="175" width="30" height="30" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="100" y="194" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">p₂</text>
  <rect x="120" y="175" width="30" height="30" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="135" y="194" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">p₃</text>
  <rect x="155" y="175" width="30" height="30" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="170" y="194" font-family="monospace" font-size="9" fill="#1D4ED8" text-anchor="middle">p₄</text>
  <text x="125" y="220" font-family="monospace, 'Courier New'" font-size="11" fill="#374151" text-anchor="middle">X_S ∈ ℝ^{N×d}</text>
  <text x="125" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">N 패치, d 차원</text>
  <text x="125" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">현재 학습 단계</text>

  <!-- Arrow to Gram matrix -->
  <line x1="220" y1="200" x2="270" y2="200" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="245" y="193" font-family="monospace" font-size="10" fill="#374151" text-anchor="middle">X·Xᵀ</text>

  <!-- Student Gram matrix -->
  <rect x="270" y="150" width="120" height="100" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="330" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6D28D9" text-anchor="middle">Gram (Student)</text>
  <text x="330" y="193" font-family="monospace" font-size="10" fill="#374151" text-anchor="middle">X_S · X_Sᵀ</text>
  <text x="330" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">패치 간</text>
  <text x="330" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">내적 행렬</text>
  <text x="330" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">N×N</text>

  <!-- Loss -->
  <rect x="430" y="155" width="200" height="90" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="530" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#92400E" text-anchor="middle">Gram Anchoring Loss</text>
  <text x="530" y="200" font-family="monospace, 'Courier New'" font-size="11" fill="#374151" text-anchor="middle">L_Gram = ‖X_S·X_Sᵀ</text>
  <text x="530" y="216" font-family="monospace, 'Courier New'" font-size="11" fill="#374151" text-anchor="middle">− X_G·X_Gᵀ‖²_F</text>
  <text x="530" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Frobenius norm 최소화</text>

  <!-- Gram teacher -->
  <rect x="270" y="280" width="120" height="100" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="330" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1D4ED8" text-anchor="middle">Gram (Teacher)</text>
  <text x="330" y="323" font-family="monospace" font-size="10" fill="#374151" text-anchor="middle">X_G · X_Gᵀ</text>
  <text x="330" y="342" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">이전 체크포인트</text>
  <text x="330" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">모델의 Gram</text>
  <text x="330" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">("기억" 앵커)</text>

  <!-- Right: Gram teacher source -->
  <rect x="640" y="260" width="160" height="80" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="720" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1D4ED8" text-anchor="middle">Gram Teacher</text>
  <text x="720" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">이전 학습 단계</text>
  <text x="720" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">체크포인트 모델</text>
  <text x="720" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">(고정, 업데이트 없음)</text>

  <line x1="640" y1="300" x2="390" y2="328" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Connect Gram student to loss -->
  <line x1="390" y1="200" x2="430" y2="200" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  <!-- Connect Gram teacher to loss -->
  <line x1="390" y1="330" x2="430" y2="230" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Effect box -->
  <rect x="640" y="130" width="160" height="100" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="720" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">효과</text>
  <text x="720" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">패치 간 공간 관계</text>
  <text x="720" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">일관성 보존</text>
  <text x="720" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Dense feature 열화</text>
  <text x="720" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">방지</text>

  <!-- Intuition label -->
  <rect x="20" y="390" width="780" height="30" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="410" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151" text-anchor="middle">직관: "새로운 것을 배우더라도, 이미 알던 패치 간 공간 구조를 잊지 마라"</text>
</svg>
