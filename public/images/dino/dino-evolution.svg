  <rect x="30" y="214" width="250" height="50" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="155" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">ViT-S / B / L</text>
  <text x="155" y="254" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">최대 ~300M params</text>

  <rect x="325" y="214" width="250" height="50" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="450" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">ViT-S / B / L / g</text>
  <text x="450" y="254" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">최대 ViT-g/14 (~1B)</text>

  <rect x="620" y="214" width="250" height="50" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="745" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">ViT-7B 교사 + 증류</text>
  <text x="745" y="254" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">6,716M → 21M~840M</text>

  <!-- Row: 손실 함수 -->
  <rect x="0" y="276" width="900" height="20" rx="0" fill="#F3F4F6"/>
  <text x="450" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6B7280" text-anchor="middle">손실 함수</text>

