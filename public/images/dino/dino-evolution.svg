  <text x="155" y="319" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">DINO Loss + Centering</text>
  <text x="155" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">배치 평균 기반 Centering</text>

  <rect x="325" y="298" width="250" height="50" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="450" y="319" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">DINO + iBOT + KoLeo</text>
  <text x="450" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Sinkhorn-Knopp Centering</text>

  <rect x="620" y="298" width="250" height="50" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="745" y="319" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">DINO + iBOT + KoLeo</text>
  <text x="745" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">+ Gram Anchoring (신규)</text>

  <!-- Row: 아키텍처 변경 -->
  <rect x="0" y="360" width="900" height="20" rx="0" fill="#F3F4F6"/>
  <text x="450" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6B7280" text-anchor="middle">아키텍처 / 위치 인코딩</text>

  <rect x="30" y="382" width="250" height="50" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="155" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Standard ViT</text>
  <text x="155" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">고정 위치 임베딩</text>

  <rect x="325" y="382" width="250" height="50" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="450" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Standard ViT</text>
  <text x="450" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">고정 위치 임베딩 유지</text>

  <rect x="620" y="382" width="250" height="50" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="745" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Axial RoPE + SwiGLU FFN</text>
  <text x="745" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">다해상도 강건성 향상</text>

  <!-- Row: ImageNet top-1 -->
  <rect x="0" y="444" width="900" height="20" rx="0" fill="#F3F4F6"/>
  <text x="450" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6B7280" text-anchor="middle">ImageNet Linear Probe (최고 모델)</text>

  <rect x="30" y="466" width="250" height="34" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="155" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D4ED8" text-anchor="middle">80.1% (ViT-B/16)</text>

  <rect x="325" y="466" width="250" height="34" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="450" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#059669" text-anchor="middle">86.5% (ViT-g/14)</text>

  <rect x="620" y="466" width="250" height="34" rx="6" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="745" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6D28D9" text-anchor="middle">88.4% (ViT-7B)</text>
