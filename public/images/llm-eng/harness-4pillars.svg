<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
  </defs>


  <!-- 지붕: 하네스 엔지니어링 -->
  <rect x="40" y="30" width="640" height="70" rx="10" fill="#1E40AF" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="360" y="62" text-anchor="middle" font-size="18" font-weight="700" fill="white">하네스 엔지니어링</text>
  <text x="360" y="84" text-anchor="middle" font-size="12" fill="#BFDBFE">LLM 에이전트 시스템 전체의 신뢰성을 책임지는 계층</text>

  <!-- 지붕 → 기둥 연결 수직선 -->
  <line x1="360" y1="100" x2="360" y2="120" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- 4기둥 -->
  <!-- 기둥 1: Skill/Plugin -->
  <rect x="40" y="130" width="145" height="220" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="40" y="130" width="145" height="42" rx="8" fill="#3B82F6"/>
  <rect x="40" y="155" width="145" height="17" rx="0" fill="#3B82F6"/>
  <text x="112" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="white">Skill / Plugin</text>
  <text x="112" y="172" text-anchor="middle" font-size="10" fill="#DBEAFE">능력 경계 정의</text>
  <text x="112" y="210" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">에이전트가</text>
  <text x="112" y="228" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">무엇을 할 수 있는가</text>
  <rect x="60" y="248" width="105" height="26" rx="6" fill="#DBEAFE"/>
  <text x="112" y="265" text-anchor="middle" font-size="10" fill="#1E40AF">Claude Skills</text>
  <rect x="60" y="282" width="105" height="26" rx="6" fill="#DBEAFE"/>
  <text x="112" y="299" text-anchor="middle" font-size="10" fill="#1E40AF">GPT Actions</text>
  <rect x="60" y="316" width="105" height="26" rx="6" fill="#DBEAFE"/>
  <text x="112" y="333" text-anchor="middle" font-size="10" fill="#1E40AF">MCP</text>

  <!-- 기둥 2: Guardrails -->
  <rect x="200" y="130" width="145" height="220" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="200" y="130" width="145" height="42" rx="8" fill="#3B82F6"/>
  <rect x="200" y="155" width="145" height="17" rx="0" fill="#3B82F6"/>
  <text x="272" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="white">Guardrails</text>
  <text x="272" y="172" text-anchor="middle" font-size="10" fill="#DBEAFE">행동 범위 실시간 제한</text>
  <text x="272" y="210" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">입출력을</text>
  <text x="272" y="228" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">구조적으로 제약</text>
  <rect x="220" y="248" width="105" height="26" rx="6" fill="#DBEAFE"/>
  <text x="272" y="265" text-anchor="middle" font-size="10" fill="#1E40AF">Input validation</text>
  <rect x="220" y="282" width="105" height="26" rx="6" fill="#DBEAFE"/>
  <text x="272" y="299" text-anchor="middle" font-size="10" fill="#1E40AF">Output filtering</text>
  <rect x="220" y="316" width="105" height="26" rx="6" fill="#DBEAFE"/>
  <text x="272" y="333" text-anchor="middle" font-size="10" fill="#1E40AF">Hallucination 감지</text>

  <!-- 기둥 3: 평가 시스템 -->
  <rect x="360" y="130" width="145" height="220" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="360" y="130" width="145" height="42" rx="8" fill="#6366F1"/>
  <rect x="360" y="155" width="145" height="17" rx="0" fill="#6366F1"/>
  <text x="432" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="white">평가 (Eval) 시스템</text>
  <text x="432" y="172" text-anchor="middle" font-size="10" fill="#E0E7FF">성능 측정 인프라</text>
  <text x="432" y="210" text-anchor="middle" font-size="11" fill="#3730A3" font-weight="600">"잘 되고 있는가"를</text>
  <text x="432" y="228" text-anchor="middle" font-size="11" fill="#3730A3" font-weight="600">지속적으로 측정</text>
  <rect x="380" y="248" width="105" height="26" rx="6" fill="#E0E7FF"/>
  <text x="432" y="265" text-anchor="middle" font-size="10" fill="#3730A3">LLM-as-a-Judge</text>
  <rect x="380" y="282" width="105" height="26" rx="6" fill="#E0E7FF"/>
  <text x="432" y="299" text-anchor="middle" font-size="10" fill="#3730A3">태스크 완수율</text>
  <rect x="380" y="316" width="105" height="26" rx="6" fill="#E0E7FF"/>
  <text x="432" y="333" text-anchor="middle" font-size="10" fill="#3730A3">추적 가능성</text>

  <!-- 기둥 4: 런타임 제어 -->
  <rect x="520" y="130" width="160" height="220" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="520" y="130" width="160" height="42" rx="8" fill="#6366F1"/>
  <rect x="520" y="155" width="160" height="17" rx="0" fill="#6366F1"/>
  <text x="600" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="white">런타임 제어</text>
  <text x="600" y="172" text-anchor="middle" font-size="10" fill="#E0E7FF">실행 중 에이전트 관리</text>
  <text x="600" y="210" text-anchor="middle" font-size="11" fill="#3730A3" font-weight="600">실패·루프·예외를</text>
  <text x="600" y="228" text-anchor="middle" font-size="11" fill="#3730A3" font-weight="600">실시간으로 처리</text>
  <rect x="540" y="248" width="120" height="26" rx="6" fill="#E0E7FF"/>
  <text x="600" y="265" text-anchor="middle" font-size="10" fill="#3730A3">상태 지속성</text>
  <rect x="540" y="282" width="120" height="26" rx="6" fill="#E0E7FF"/>
  <text x="600" y="299" text-anchor="middle" font-size="10" fill="#3730A3">중단-재개</text>
  <rect x="540" y="316" width="120" height="26" rx="6" fill="#E0E7FF"/>
  <text x="600" y="333" text-anchor="middle" font-size="10" fill="#3730A3">루프 감지</text>

  <!-- 기둥 아래 → LLM 연결 수직선 -->
  <line x1="112" y1="350" x2="112" y2="390" stroke="#3B82F6" stroke-width="1.2"/>
  <line x1="272" y1="350" x2="272" y2="390" stroke="#3B82F6" stroke-width="1.2"/>
  <line x1="432" y1="350" x2="432" y2="390" stroke="#6366F1" stroke-width="1.2"/>
  <line x1="600" y1="350" x2="600" y2="390" stroke="#6366F1" stroke-width="1.2"/>

  <!-- LLM 기반 -->
  <rect x="40" y="390" width="640" height="60" rx="10" fill="#374151" stroke="#1F2937" stroke-width="1.5"/>
  <text x="360" y="422" text-anchor="middle" font-size="16" font-weight="700" fill="white">LLM</text>
  <text x="360" y="441" text-anchor="middle" font-size="11" fill="#9CA3AF">비결정론적 언어 모델 — 하네스가 감싸는 대상</text>
</svg>
