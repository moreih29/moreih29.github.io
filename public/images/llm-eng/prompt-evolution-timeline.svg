  <!-- Bottom note -->
  <text x="390" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9CA3AF">색상 밝기: 계층 높을수록 진한 파란색 (L1 연하늘 → L5 진파랑)</text>
