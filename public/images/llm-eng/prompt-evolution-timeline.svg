  <text x="210" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1E40AF" font-weight="bold">L1</text>
  <text x="210" y="243" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" font-weight="bold">CoT + RLHF</text>
  <text x="210" y="258" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B7280">ReAct</text>
