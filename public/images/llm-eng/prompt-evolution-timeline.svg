  <!-- Year label -->
  <text x="90" y="198" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7280" font-weight="bold">2020</text>
  <!-- Card (above) -->
  <rect x="40" y="60" width="100" height="68" rx="6" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1.2"/>
  <text x="90" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1E40AF" font-weight="bold">L1</text>
  <text x="90" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" font-weight="bold">GPT-3</text>
  <text x="90" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B7280">In-Context</text>
  <text x="90" y="123" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B7280">Learning</text>
  <!-- Connector -->
