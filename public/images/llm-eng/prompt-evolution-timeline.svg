  <text x="490" y="243" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" font-weight="bold">MCP + o1</text>
  <text x="490" y="258" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B7280">에이전트 프레임워크</text>
