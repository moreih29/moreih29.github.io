<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" fill="none">
  <!-- Background transparent -->

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#374151" font-weight="bold">프롬프트 기법 진화 타임라인 (2020–2026)</text>

  <!-- Timeline base line -->
