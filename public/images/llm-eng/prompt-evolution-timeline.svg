  <text x="615" y="101" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" font-weight="bold">엔지니어링</text>
  <text x="615" y="116" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B7280">DeepSeek R1</text>
  <text x="615" y="131" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B7280">MCP 표준화</text>
