<svg viewBox="0 0 880 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 L2,3.5 Z" fill="#6B7280"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 L2,3.5 Z" fill="#3B82F6"/>
    </marker>
  </defs>


  <!-- 제목 -->
  <text x="440" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">워크플로우 패턴 5종 비교</text>
  <text x="440" y="58" text-anchor="middle" font-size="12" fill="#6B7280">Anthropic · Azure Architecture Center · OpenAI Agents SDK 교차 검증</text>

  <!-- ===== 1. Sequential ===== -->
  <rect x="30" y="80" width="250" height="160" rx="8" fill="white" stroke="#DBEAFE" stroke-width="1.5"/>
  <rect x="30" y="80" width="250" height="30" rx="8" fill="#DBEAFE"/>
  <rect x="30" y="100" width="250" height="10" rx="0" fill="#DBEAFE"/>
  <text x="155" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">1. Sequential (순차)</text>

  <rect x="50" y="128" width="54" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="77" y="148" text-anchor="middle" font-size="11" fill="#1E40AF">입력</text>

  <line x1="104" y1="143" x2="120" y2="143" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="122" y="128" width="54" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="149" y="148" text-anchor="middle" font-size="11" fill="#1E40AF">단계 A</text>

  <line x1="176" y1="143" x2="192" y2="143" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="194" y="128" width="54" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="221" y="148" text-anchor="middle" font-size="11" fill="#1E40AF">단계 B</text>

  <rect x="96" y="172" width="74" height="22" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="133" y="187" text-anchor="middle" font-size="10" fill="#92400E">Gate (검증)</text>

  <text x="155" y="218" text-anchor="middle" font-size="10" fill="#374151">단계가 명확하고 순서가 있는 태스크</text>
  <text x="155" y="232" text-anchor="middle" font-size="10" fill="#6B7280">문서 추출 → 분류 → 요약</text>

  <!-- ===== 2. Parallel ===== -->
  <rect x="310" y="80" width="250" height="160" rx="8" fill="white" stroke="#DBEAFE" stroke-width="1.5"/>
  <rect x="310" y="80" width="250" height="30" rx="8" fill="#DBEAFE"/>
  <rect x="310" y="100" width="250" height="10" rx="0" fill="#DBEAFE"/>
  <text x="435" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">2. Parallel (병렬)</text>

  <rect x="380" y="120" width="50" height="26" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="405" y="137" text-anchor="middle" font-size="11" fill="#1E40AF">분기</text>

  <line x1="393" y1="146" x2="352" y2="162" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="405" y1="146" x2="405" y2="162" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="417" y1="146" x2="458" y2="162" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="323" y="163" width="48" height="26" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="347" y="180" text-anchor="middle" font-size="10" fill="#1E40AF">Worker 1</text>
  <rect x="381" y="163" width="48" height="26" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="405" y="180" text-anchor="middle" font-size="10" fill="#1E40AF">Worker 2</text>
  <rect x="439" y="163" width="48" height="26" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="463" y="180" text-anchor="middle" font-size="10" fill="#1E40AF">Worker 3</text>

  <line x1="347" y1="189" x2="390" y2="205" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="405" y1="189" x2="405" y2="205" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="463" y1="189" x2="420" y2="205" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="379" y="206" width="52" height="26" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.3"/>
  <text x="405" y="223" text-anchor="middle" font-size="10" fill="#92400E">집계</text>

  <text x="435" y="248" text-anchor="middle" font-size="10" fill="#374151">독립 서브태스크 분해 · 병렬 실행</text>

  <!-- ===== 3. Router ===== -->
  <rect x="590" y="80" width="265" height="160" rx="8" fill="white" stroke="#DBEAFE" stroke-width="1.5"/>
  <rect x="590" y="80" width="265" height="30" rx="8" fill="#DBEAFE"/>
  <rect x="590" y="100" width="265" height="10" rx="0" fill="#DBEAFE"/>
  <text x="722" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">3. Router (라우터)</text>

  <rect x="690" y="118" width="64" height="28" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="722" y="136" text-anchor="middle" font-size="11" fill="#1E40AF">입력 분류</text>

  <line x1="708" y1="146" x2="660" y2="163" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="722" y1="146" x2="722" y2="163" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="736" y1="146" x2="784" y2="163" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="615" y="164" width="64" height="26" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="647" y="181" text-anchor="middle" font-size="10" fill="#1E40AF">에이전트 A</text>
  <rect x="690" y="164" width="64" height="26" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="722" y="181" text-anchor="middle" font-size="10" fill="#1E40AF">에이전트 B</text>
  <rect x="757" y="164" width="64" height="26" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="789" y="181" text-anchor="middle" font-size="10" fill="#1E40AF">에이전트 C</text>

  <text x="722" y="218" text-anchor="middle" font-size="10" fill="#374151">도메인별 전문 에이전트 분배</text>
  <text x="722" y="232" text-anchor="middle" font-size="10" fill="#6B7280">고객 서비스 · 다언어 지원</text>

  <!-- ===== 4. Orchestrator-Workers ===== -->
  <rect x="30" y="270" width="400" height="170" rx="8" fill="white" stroke="#DBEAFE" stroke-width="1.5"/>
  <rect x="30" y="270" width="400" height="30" rx="8" fill="#DBEAFE"/>
  <rect x="30" y="290" width="400" height="10" rx="0" fill="#DBEAFE"/>
  <text x="230" y="291" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">4. Orchestrator-Workers (오케스트레이터-워커)</text>

  <rect x="168" y="312" width="120" height="36" rx="8" fill="#1E40AF"/>
  <text x="228" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="white">오케스트레이터</text>

  <line x1="170" y1="348" x2="100" y2="372" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="228" y1="348" x2="228" y2="372" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="286" y1="348" x2="356" y2="372" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="55" y="374" width="90" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="100" y="393" text-anchor="middle" font-size="11" fill="#1E40AF">Worker 1</text>
  <rect x="183" y="374" width="90" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="228" y="393" text-anchor="middle" font-size="11" fill="#1E40AF">Worker 2</text>
  <rect x="311" y="374" width="90" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="356" y="393" text-anchor="middle" font-size="11" fill="#1E40AF">Worker 3</text>

  <text x="230" y="428" text-anchor="middle" font-size="10" fill="#374151">오케스트레이터 1 + 워커 2~4 구성이 실무 수렴 비율</text>
  <text x="230" y="442" text-anchor="middle" font-size="10" fill="#6B7280">코딩 · 연구 · 복잡한 분석</text>

  <!-- ===== 5. Evaluator-Optimizer ===== -->
  <rect x="460" y="270" width="395" height="170" rx="8" fill="white" stroke="#DBEAFE" stroke-width="1.5"/>
  <rect x="460" y="270" width="395" height="30" rx="8" fill="#DBEAFE"/>
  <rect x="460" y="290" width="395" height="10" rx="0" fill="#DBEAFE"/>
  <text x="657" y="291" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">5. Evaluator-Optimizer (평가-최적화)</text>

  <rect x="526" y="314" width="88" height="32" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="570" y="334" text-anchor="middle" font-size="12" fill="#1E40AF">Generate</text>

  <line x1="614" y1="330" x2="640" y2="330" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="641" y="314" width="88" height="32" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.3"/>
  <text x="685" y="334" text-anchor="middle" font-size="12" fill="#92400E">Evaluate</text>

  <line x1="729" y1="330" x2="755" y2="330" stroke="#6B7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="756" y="314" width="82" height="32" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="797" y="334" text-anchor="middle" font-size="12" fill="#1E40AF">Improve</text>

  <!-- 루프 화살표 -->
  <path d="M797,346 Q797,390 685,390 Q573,390 570,346" fill="none" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="685" y="385" text-anchor="middle" font-size="10" fill="#92400E">반복 (상한 필수)</text>

  <text x="657" y="428" text-anchor="middle" font-size="10" fill="#374151">특정 성공 기준이 있고 한 번에 충족 어려운 경우</text>
  <text x="657" y="442" text-anchor="middle" font-size="10" fill="#6B7280">번역 품질 · 코드 리뷰 · 문서 생성</text>

  <!-- 하단 범례 -->
  <rect x="30" y="464" width="820" height="60" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.2"/>
  <text x="440" y="485" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">패턴 선택 원칙: 단순한 패턴으로 시작하고, 실증된 필요에 따라 확장하라</text>
  <rect x="52" y="496" width="10" height="10" rx="2" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="68" y="506" font-size="10" fill="#374151">에이전트 / 단계</text>
  <rect x="200" y="496" width="10" height="10" rx="2" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="216" y="506" font-size="10" fill="#374151">검증 / 평가 단계</text>
  <rect x="370" y="496" width="10" height="10" rx="2" fill="#1E40AF"/>
  <text x="386" y="506" font-size="10" fill="#374151">오케스트레이터</text>

  <!-- 하단 노트 -->
  <text x="440" y="546" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">복잡도 낮음</text>
  <line x1="520" y1="542" x2="680" y2="542" stroke="#6B7280" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="730" y="546" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">복잡도 높음</text>
  <text x="440" y="565" text-anchor="middle" font-size="10" fill="#9CA3AF">Sequential → Parallel → Router → Orchestrator-Workers → Evaluator-Optimizer</text>

  <text x="440" y="596" text-anchor="middle" font-size="10" fill="#9CA3AF">출처: Anthropic "Building Effective Agents" (2024) · Azure Architecture Center · OpenAI Agents SDK</text>
</svg>
