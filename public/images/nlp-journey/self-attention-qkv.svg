<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="none"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#374151">Self-Attention: Query, Key, Value</text>

  <!-- ===== INPUT EMBEDDING ===== -->
  <rect x="310" y="55" width="140" height="40" rx="8" fill="#374151" opacity="0.1" stroke="#374151" stroke-width="1.5"/>
  <text x="380" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">입력 임베딩 (X)</text>

  <!-- Three projection arrows from input -->
  <line x1="340" y1="95" x2="150" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="95" x2="380" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="95" x2="610" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Linear projection labels -->
  <text x="230" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">W_Q</text>
  <text x="380" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">W_K</text>
  <text x="530" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">W_V</text>

  <!-- Q, K, V boxes -->
  <rect x="90" y="148" width="120" height="45" rx="8" fill="#374151" opacity="0.15" stroke="#374151" stroke-width="2"/>
  <text x="150" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#374151">Q (Query)</text>

  <rect x="320" y="148" width="120" height="45" rx="8" fill="#374151" opacity="0.15" stroke="#374151" stroke-width="2"/>
  <text x="380" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#374151">K (Key)</text>

  <rect x="550" y="148" width="120" height="45" rx="8" fill="#374151" opacity="0.15" stroke="#374151" stroke-width="2"/>
  <text x="610" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#374151">V (Value)</text>

  <!-- Q and K merge into matmul -->
  <line x1="150" y1="193" x2="250" y2="238" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="193" x2="290" y2="238" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MatMul Q x K^T -->
  <rect x="220" y="240" width="120" height="40" rx="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="280" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Q x K^T</text>

  <!-- Scale -->
  <line x1="280" y1="280" x2="280" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="220" y="312" width="120" height="35" rx="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="280" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">/ sqrt(dk)</text>
  <text x="355" y="334" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">스케일링</text>

  <!-- Softmax -->
  <line x1="280" y1="347" x2="280" y2="372" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="220" y="374" width="120" height="35" rx="8" fill="#374151" opacity="0.1" stroke="#374151" stroke-width="1.5"/>
  <text x="280" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Softmax</text>
  <text x="355" y="396" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">가중치 정규화</text>

  <!-- Arrow from softmax to multiply with V -->
  <line x1="340" y1="392" x2="430" y2="392" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- V arrow down to multiply -->
  <line x1="610" y1="193" x2="610" y2="378" stroke="#374151" stroke-width="1.5"/>
  <line x1="610" y1="392" x2="520" y2="392" stroke="#374151" stroke-width="1.5"/>

  <!-- Multiply with V -->
  <rect x="435" y="372" width="80" height="40" rx="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="475" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">x V</text>

  <!-- Output -->
  <line x1="515" y1="392" x2="560" y2="392" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="565" y="374" width="120" height="38" rx="8" fill="#374151" opacity="0.15" stroke="#374151" stroke-width="2"/>
  <text x="625" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">출력</text>

  <!-- Formula at bottom -->
  <rect x="130" y="435" width="500" height="35" rx="6" fill="#374151" opacity="0.06" stroke="#374151" stroke-width="1"/>
  <text x="380" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Attention(Q, K, V) = softmax(QK^T / sqrt(dk)) x V</text>
</svg>