<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <rect width="760" height="400" fill="none"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#374151">Seq2Seq + Attention 구조</text>

  <!-- ===== ENCODER SECTION ===== -->
  <text x="190" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">인코더 (Encoder)</text>

  <!-- Input tokens -->
  <rect x="60" y="310" width="70" height="35" rx="6" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="95" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">x1</text>

  <rect x="155" y="310" width="70" height="35" rx="6" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="190" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">x2</text>

  <rect x="250" y="310" width="70" height="35" rx="6" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="285" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">x3</text>

  <text x="190" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">입력 토큰</text>

  <!-- Arrows from input to hidden states -->
  <line x1="95" y1="310" x2="95" y2="260" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="310" x2="190" y2="260" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="285" y1="310" x2="285" y2="260" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Hidden states -->
  <rect x="65" y="220" width="60" height="40" rx="8" fill="#374151" opacity="0.12" stroke="#374151" stroke-width="1.5"/>
  <text x="95" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">h1</text>

  <rect x="160" y="220" width="60" height="40" rx="8" fill="#374151" opacity="0.12" stroke="#374151" stroke-width="1.5"/>
  <text x="190" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">h2</text>

  <rect x="255" y="220" width="60" height="40" rx="8" fill="#374151" opacity="0.12" stroke="#374151" stroke-width="1.5"/>
  <text x="285" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">h3</text>

  <text x="190" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">은닉 상태 (hidden states)</text>

  <!-- Arrows between hidden states (sequential) -->
  <line x1="125" y1="240" x2="157" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="220" y1="240" x2="252" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== ATTENTION SECTION ===== -->
  <!-- Attention weights connecting encoder to decoder -->
  <!-- From h1 to context -->
  <path d="M 95 220 Q 95 160 430 135" stroke="#374151" stroke-width="1" stroke-dasharray="5,3" fill="none" opacity="0.5"/>
  <text x="200" y="148" font-family="Arial, sans-serif" font-size="11" fill="#374151" opacity="0.7">alpha1</text>

  <!-- From h2 to context -->
  <path d="M 190 220 Q 280 150 430 135" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" fill="none" opacity="0.7"/>
  <text x="300" y="158" font-family="Arial, sans-serif" font-size="11" fill="#374151" opacity="0.7">alpha2</text>

  <!-- From h3 to context -->
  <path d="M 285 220 Q 350 160 430 135" stroke="#374151" stroke-width="2" stroke-dasharray="5,3" fill="none" opacity="0.9"/>
  <text x="370" y="168" font-family="Arial, sans-serif" font-size="11" fill="#374151" opacity="0.9">alpha3</text>

  <!-- Attention weight label -->
  <text x="280" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#374151">Attention 가중치 (alpha)</text>
  <text x="280" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">선 굵기 = 가중치 크기</text>

  <!-- ===== CONTEXT VECTOR ===== -->
  <rect x="400" y="110" width="100" height="50" rx="10" fill="#374151" opacity="0.15" stroke="#374151" stroke-width="2"/>
  <text x="450" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">Context</text>
  <text x="450" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#374151">Vector</text>

  <!-- Formula below context -->
  <text x="450" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">c_i = Sigma(alpha_ij x h_j)</text>

  <!-- ===== DECODER SECTION ===== -->
  <text x="600" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">디코더 (Decoder)</text>

  <!-- Arrow from context to decoder -->
  <line x1="500" y1="135" x2="540" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Decoder hidden states -->
  <rect x="540" y="220" width="60" height="40" rx="8" fill="#374151" opacity="0.12" stroke="#374151" stroke-width="1.5"/>
  <text x="570" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">s1</text>

  <rect x="630" y="220" width="60" height="40" rx="8" fill="#374151" opacity="0.12" stroke="#374151" stroke-width="1.5"/>
  <text x="660" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">s2</text>

  <!-- Arrow between decoder states -->
  <line x1="600" y1="240" x2="627" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output tokens -->
  <line x1="570" y1="260" x2="570" y2="305" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="660" y1="260" x2="660" y2="305" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="540" y="310" width="60" height="35" rx="6" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="570" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">y1</text>

  <rect x="630" y="310" width="60" height="35" rx="6" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="660" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">y2</text>

  <text x="615" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">출력 토큰</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>
</svg>