<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none" font-family="system-ui, -apple-system, sans-serif">

  <!-- 제목 -->
  <text x="320" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">양자화 기법 포지셔닝 비교</text>
  <text x="320" y="48" text-anchor="middle" font-size="11" fill="#6B7280">압축 대상 × 적용 방식 기준 4분면 분류</text>

  <!-- ─── 4분면 배경 ─── -->
  <!-- Q2: 가중치 + 오프라인 (좌상) -->
  <rect x="80" y="70" width="240" height="200" rx="0" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Q1: KV 캐시 + 오프라인 (우상) -->
  <rect x="320" y="70" width="240" height="200" rx="0" fill="#FFF7ED" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Q3: 가중치 + 온라인 (좌하) -->
  <rect x="80" y="270" width="240" height="160" rx="0" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Q4: KV 캐시 + 온라인 (우하) — TurboQuant 영역, 강조 -->
  <rect x="320" y="270" width="240" height="160" rx="0" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>

  <!-- ─── 축 ─── -->
  <!-- X축 (수평) -->
  <line x1="80" y1="270" x2="560" y2="270" stroke="#374151" stroke-width="2"/>
  <!-- Y축 (수직) -->
  <line x1="320" y1="70" x2="320" y2="430" stroke="#374151" stroke-width="2"/>

  <!-- X축 화살표 -->
  <polygon points="556,265 570,270 556,275" fill="#374151"/>
  <polygon points="84,265 70,270 84,275" fill="#374151"/>
  <!-- Y축 화살표 -->
  <polygon points="315,74 320,60 325,74" fill="#374151"/>
  <polygon points="315,426 320,440 325,426" fill="#374151"/>

  <!-- 축 레이블 -->
  <text x="575" y="274" font-size="11" font-weight="600" fill="#374151">KV 캐시</text>
  <text x="30" y="274" font-size="11" font-weight="600" fill="#374151">가중치</text>
  <text x="320" y="54" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">오프라인</text>
  <text x="320" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">온라인</text>

  <!-- 축 보조 텍스트 -->
  <text x="200" y="92" text-anchor="middle" font-size="9" fill="#9CA3AF">← 압축 대상 →</text>
  <text x="62" y="180" text-anchor="middle" font-size="9" fill="#9CA3AF" transform="rotate(-90,62,180)">← 적용 방식 →</text>

  <!-- ─── 기법 카드들 ─── -->

  <!-- GPTQ (Q2: 가중치 + 오프라인) -->
  <rect x="96" y="100" width="96" height="52" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="144" y="121" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">GPTQ</text>
  <text x="144" y="136" text-anchor="middle" font-size="9" fill="#6B7280">가중치 · Calibration</text>
  <text x="144" y="148" text-anchor="middle" font-size="9" fill="#6B7280">4-8 bit</text>

  <!-- AWQ (Q2: 가중치 + 오프라인) -->
  <rect x="207" y="100" width="96" height="52" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="255" y="121" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">AWQ</text>
  <text x="255" y="136" text-anchor="middle" font-size="9" fill="#6B7280">가중치 · Calibration</text>
  <text x="255" y="148" text-anchor="middle" font-size="9" fill="#6B7280">4 bit, 활성화 보정</text>

  <!-- GGUF (Q2: 가중치 + 오프라인) -->
  <rect x="150" y="175" width="96" height="52" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="198" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">GGUF</text>
  <text x="198" y="211" text-anchor="middle" font-size="9" fill="#6B7280">가중치 · 데이터 불필요</text>
  <text x="198" y="223" text-anchor="middle" font-size="9" fill="#6B7280">4-8 bit, llama.cpp</text>

  <!-- KIVI (Q1: KV캐시 + 오프라인/제한적) -->
  <rect x="336" y="130" width="100" height="52" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="386" y="151" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">KIVI</text>
  <text x="386" y="166" text-anchor="middle" font-size="9" fill="#92400E">KV 캐시 · 제한적</text>
  <text x="386" y="178" text-anchor="middle" font-size="9" fill="#92400E">ICML 2024</text>
  <!-- 제한적 표시 -->
  <text x="386" y="200" text-anchor="middle" font-size="8" fill="#9CA3AF">(온라인 적용 제한)</text>

  <!-- TurboQuant (Q4: KV캐시 + 온라인) — 강조 -->
  <rect x="338" y="290" width="184" height="100" rx="10" fill="#D1FAE5" stroke="#059669" stroke-width="3"/>
  <!-- 강조 배지 -->
  <rect x="338" y="290" width="184" height="24" rx="10" fill="#059669"/>
  <rect x="338" y="302" width="184" height="12" fill="#059669"/>
  <text x="430" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="white">TurboQuant</text>
  <text x="430" y="325" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">KV 캐시 · 온라인</text>
  <text x="430" y="342" text-anchor="middle" font-size="10" fill="#065F46">훈련/데이터 불필요</text>
  <text x="430" y="357" text-anchor="middle" font-size="10" fill="#065F46">~3 bit · 최대 8× 성능향상</text>
  <text x="430" y="372" text-anchor="middle" font-size="9" fill="#059669">ICLR 2026 · Google Research</text>

  <!-- ─── 비어있는 영역 설명 ─── -->
  <text x="170" y="340" text-anchor="middle" font-size="10" fill="#D1D5DB">해당 기법 없음</text>
  <text x="170" y="356" text-anchor="middle" font-size="9" fill="#D1D5DB">(가중치는 온라인</text>
  <text x="170" y="370" text-anchor="middle" font-size="9" fill="#D1D5DB">압축 실익 없음)</text>

  <!-- ─── 범례 ─── -->
  <rect x="80" y="445" width="480" height="25" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="96" y="453" width="10" height="10" rx="2" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="112" y="462" font-size="9" fill="#374151">기존 가중치 양자화</text>
  <rect x="240" y="453" width="10" height="10" rx="2" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="256" y="462" font-size="9" fill="#374151">KV 캐시 (제한적)</text>
  <rect x="380" y="453" width="10" height="10" rx="2" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="396" y="462" font-size="9" fill="#374151">TurboQuant (강조)</text>

  <!-- 상호보완 주석 -->
  <line x1="240" y1="145" x2="330" y2="155" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="272" y="140" text-anchor="middle" font-size="8" fill="#9CA3AF">경쟁X</text>
  <text x="272" y="150" text-anchor="middle" font-size="8" fill="#9CA3AF">상호보완</text>

</svg>
