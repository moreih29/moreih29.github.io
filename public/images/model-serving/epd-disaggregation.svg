<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" fill="none">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22C55E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#374151">EPD 분리 서빙 — 멀티모달(VLM) 아키텍처 비교</text>

  <!-- ==================== LEFT: 기존 아키텍처 ==================== -->
  <rect x="20" y="44" width="380" height="420" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="210" y="68" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#991B1B">기존: 단일 GPU 공유</text>

  <!-- Single GPU box -->
  <rect x="40" y="82" width="340" height="360" rx="8" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
  <text x="210" y="102" text-anchor="middle" font-family="monospace" font-size="11" fill="#7F1D1D">GPU 0 (공유)</text>

  <!-- Request input arrow -->
  <text x="210" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">멀티모달 요청 (이미지 + 텍스트)</text>
  <line x1="210" y1="136" x2="210" y2="155" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Encoder block -->
  <rect x="70" y="158" width="280" height="54" rx="6" fill="#FECACA" stroke="#EF4444" stroke-width="2"/>
  <text x="210" y="179" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#374151">비주얼 인코더 (ViT)</text>
  <text x="210" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="#991B1B">이미지 → 수천 개 비전 토큰 생성</text>
  <line x1="210" y1="213" x2="210" y2="231" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>

  <!-- Interference label -->
  <text x="248" y="225" font-family="monospace" font-size="9" fill="#EF4444">↑ GPU 간섭</text>

  <!-- Prefill block -->
  <rect x="70" y="234" width="280" height="50" rx="6" fill="#FECACA" stroke="#EF4444" stroke-width="2"/>
  <text x="210" y="255" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#374151">프리필 (Prefill)</text>
  <text x="210" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#991B1B">compute-bound · KV 생성</text>
  <line x1="210" y1="285" x2="210" y2="303" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>

  <!-- Interference label 2 -->
  <text x="248" y="297" font-family="monospace" font-size="9" fill="#EF4444">↑ 자원 경합</text>

  <!-- Decode block -->
  <rect x="70" y="306" width="280" height="50" rx="6" fill="#FECACA" stroke="#EF4444" stroke-width="2"/>
  <text x="210" y="327" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#374151">디코드 (Decode)</text>
  <text x="210" y="342" text-anchor="middle" font-family="monospace" font-size="10" fill="#991B1B">memory-bound · 토큰 생성</text>

  <!-- Output -->
  <line x1="210" y1="357" x2="210" y2="375" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="110" y="378" width="200" height="36" rx="6" fill="#FEE2E2" stroke="#F87171" stroke-width="1.5"/>
  <text x="210" y="393" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">텍스트 응답</text>
  <text x="210" y="408" text-anchor="middle" font-family="monospace" font-size="9" fill="#991B1B">높은 TTFT · 낮은 Goodput</text>

  <!-- Metrics box (existing) -->
  <rect x="40" y="426" width="340" height="30" rx="4" fill="#FCA5A5" stroke="#EF4444" stroke-width="1"/>
  <text x="210" y="446" text-anchor="middle" font-family="monospace" font-size="10" fill="#7F1D1D">TTFT 높음 · Goodput 낮음 · 비용 과다</text>

  <!-- ==================== RIGHT: EPD 분리 아키텍처 ==================== -->
  <rect x="460" y="44" width="380" height="420" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="650" y="68" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#166534">EPD: 전용 GPU 분리</text>

  <!-- Request input -->
  <text x="650" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">멀티모달 요청 (이미지 + 텍스트)</text>
  <line x1="570" y1="104" x2="540" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="104" x2="650" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="730" y1="104" x2="760" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GPU E: Encoder -->
  <rect x="480" y="122" width="140" height="96" rx="8" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>
  <text x="550" y="142" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#166534">GPU E</text>
  <text x="550" y="157" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">비주얼 인코더</text>
  <rect x="496" y="164" width="108" height="30" rx="4" fill="#A7F3D0" stroke="#10B981" stroke-width="1"/>
  <text x="550" y="177" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">ViT 전용 실행</text>
  <text x="550" y="189" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">비전 토큰 생성</text>
  <text x="550" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">LMCache: 히트 1초</text>

  <!-- GPU P: Prefill -->
  <rect x="650" y="122" width="140" height="96" rx="8" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="720" y="142" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#1E40AF">GPU P</text>
  <text x="720" y="157" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">프리필 전용</text>
  <rect x="666" y="164" width="108" height="30" rx="4" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="720" y="177" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">KV 캐시 생성</text>
  <text x="720" y="189" text-anchor="middle" font-family="monospace" font-size="9" fill="#1E40AF">compute-bound</text>
  <text x="720" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">chunked prefill</text>

  <!-- Flow arrows between GPUs (E → P, P → D) -->
  <line x1="621" y1="170" x2="649" y2="170" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="635" y="165" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">비전 토큰</text>

  <!-- Arrow P → D -->
  <line x1="720" y1="218" x2="720" y2="248" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="735" y="238" font-family="monospace" font-size="8" fill="#6B7280">KV 전송</text>

  <!-- E → D arrow (visual token flow to decode) -->
  <line x1="550" y1="218" x2="550" y2="340" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- GPU D: Decode -->
  <rect x="565" y="252" width="300" height="96" rx="8" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2"/>
  <text x="715" y="272" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#92400E">GPU D</text>
  <text x="715" y="287" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">디코드 전용</text>
  <rect x="581" y="294" width="268" height="30" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1"/>
  <text x="715" y="307" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">memory-bound · 연속 배치</text>
  <text x="715" y="319" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400E">Dynamic-LLaVA: 연산 50% ↓</text>
  <text x="715" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">독립 스케일링 가능</text>

  <!-- Output -->
  <line x1="715" y1="349" x2="715" y2="367" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="575" y="370" width="280" height="36" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1.5"/>
  <text x="715" y="385" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">텍스트 응답</text>
  <text x="715" y="400" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">TTFT 32-72% ↓ · Goodput 2x ↑</text>

  <!-- Metrics box (EPD) -->
  <rect x="480" y="426" width="340" height="30" rx="4" fill="#86EFAC" stroke="#22C55E" stroke-width="1"/>
  <text x="650" y="446" text-anchor="middle" font-family="monospace" font-size="10" fill="#166534">비용 25-41% ↓ · Goodput 2x · TTFT 크게 감소</text>

  <!-- Center VS label -->
  <text x="430" y="260" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#374151">VS</text>
</svg>
