<svg viewBox="0 0 780 460" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#374151"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#DC2626"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#059669"/>
    </marker>
  </defs>

  <!-- ─── TITLE ─── -->
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#374151">임베딩 서빙 파이프라인 최적화 — 병목 해소 전후 비교</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BEFORE: 기존 파이프라인 -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="20" y="44" width="740" height="178" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.8"/>
  <text x="40" y="66" font-size="12" font-weight="bold" fill="#DC2626">기존 파이프라인 — CPU 병목</text>

  <!-- 요청 -->
  <rect x="40" y="80" width="90" height="44" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="85" y="99" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">요청</text>
  <text x="85" y="114" text-anchor="middle" font-size="9" fill="#6B7280">텍스트 배치</text>

  <!-- arrow -->
  <line x1="131" y1="102" x2="155" y2="102" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arr-red)"/>

  <!-- 토크나이저 (CPU) — 병목 강조 -->
  <rect x="156" y="70" width="210" height="64" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="2.2"/>
  <text x="261" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#DC2626">토크나이저 (CPU)</text>
  <text x="261" y="106" text-anchor="middle" font-size="9" fill="#374151">전체 시간의 90% 소비</text>
  <text x="261" y="120" text-anchor="middle" font-size="9" fill="#DC2626">★ 병목 구간</text>

  <!-- 병목 표시 -->
  <rect x="156" y="140" width="210" height="22" rx="4" fill="#FECACA" stroke="none"/>
  <text x="261" y="155" text-anchor="middle" font-size="9" fill="#DC2626">GPU는 90% 시간 유휴 대기 중</text>

  <!-- arrow -->
  <line x1="367" y1="102" x2="391" y2="102" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arr-red)"/>

  <!-- GPU 추론 -->
  <rect x="392" y="80" width="140" height="44" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="462" y="99" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">GPU 추론</text>
  <text x="462" y="114" text-anchor="middle" font-size="9" fill="#6B7280">전체 시간의 10%만</text>

  <!-- arrow -->
  <line x1="533" y1="102" x2="557" y2="102" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arr-red)"/>

  <!-- 응답 -->
  <rect x="558" y="80" width="90" height="44" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="603" y="99" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">응답</text>
  <text x="603" y="114" text-anchor="middle" font-size="9" fill="#6B7280">임베딩 벡터</text>

  <!-- 처리량 라벨 -->
  <text x="680" y="96" font-size="10" fill="#DC2626" font-weight="bold">처리량</text>
  <text x="680" y="112" font-size="10" fill="#DC2626" font-weight="bold">기준 1x</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- AFTER: 최적화 파이프라인 -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="20" y="242" width="740" height="198" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.8"/>
  <text x="40" y="264" font-size="12" font-weight="bold" fill="#059669">최적화 파이프라인 — 3가지 개선</text>

  <!-- 요청 큐 -->
  <rect x="40" y="278" width="100" height="44" rx="6" fill="#D1FAE5" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="90" y="297" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">요청 큐</text>
  <text x="90" y="312" text-anchor="middle" font-size="9" fill="#6B7280">직렬화 최적화</text>

  <!-- arrow down to tokenizer pool -->
  <line x1="90" y1="323" x2="90" y2="347" stroke="#059669" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- 토크나이저 풀 (분리) -->
  <rect x="40" y="348" width="100" height="74" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.8"/>
  <text x="90" y="367" text-anchor="middle" font-size="9" font-weight="bold" fill="#059669">토크나이저 풀</text>
  <text x="90" y="381" text-anchor="middle" font-size="9" fill="#374151">독립 프로세스</text>
  <text x="90" y="395" text-anchor="middle" font-size="8" fill="#6B7280">파이프라인 분리</text>
  <text x="90" y="408" text-anchor="middle" font-size="8" fill="#059669">비동기 처리</text>

  <!-- improvement 1 label -->
  <rect x="148" y="278" width="120" height="36" rx="4" fill="#DCFCE7" stroke="none"/>
  <text x="208" y="293" text-anchor="middle" font-size="9" font-weight="bold" fill="#059669">① 직렬화 최적화</text>
  <text x="208" y="307" text-anchor="middle" font-size="8" fill="#374151">네트워크 전송 오버헤드 감소</text>

  <!-- improvement 2 label -->
  <rect x="148" y="322" width="120" height="36" rx="4" fill="#DCFCE7" stroke="none"/>
  <text x="208" y="337" text-anchor="middle" font-size="9" font-weight="bold" fill="#059669">② 파이프라인 분리</text>
  <text x="208" y="351" text-anchor="middle" font-size="8" fill="#374151">토크나이저 ↔ GPU 독립 실행</text>

  <!-- improvement 3 label -->
  <rect x="148" y="366" width="120" height="50" rx="4" fill="#DCFCE7" stroke="none"/>
  <text x="208" y="381" text-anchor="middle" font-size="9" font-weight="bold" fill="#059669">③ 다중 복제본</text>
  <text x="208" y="395" text-anchor="middle" font-size="8" fill="#374151">GPU 인스턴스 수평 확장</text>
  <text x="208" y="409" text-anchor="middle" font-size="8" fill="#374151">병렬 처리 극대화</text>

  <!-- arrow right from tokenizer pool to GPU replicas -->
  <line x1="141" y1="385" x2="283" y2="320" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="141" y1="385" x2="283" y2="370" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="141" y1="385" x2="283" y2="420" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- GPU 복제본 1 -->
  <rect x="284" y="278" width="130" height="48" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="349" y="298" text-anchor="middle" font-size="9" font-weight="bold" fill="#374151">GPU 추론 #1</text>
  <text x="349" y="312" text-anchor="middle" font-size="8" fill="#6B7280">임베딩 모델</text>
  <text x="349" y="324" text-anchor="middle" font-size="8" fill="#059669">상시 풀가동</text>

  <!-- GPU 복제본 2 -->
  <rect x="284" y="338" width="130" height="48" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="349" y="358" text-anchor="middle" font-size="9" font-weight="bold" fill="#374151">GPU 추론 #2</text>
  <text x="349" y="372" text-anchor="middle" font-size="8" fill="#6B7280">임베딩 모델</text>
  <text x="349" y="384" text-anchor="middle" font-size="8" fill="#059669">상시 풀가동</text>

  <!-- GPU 복제본 N -->
  <rect x="284" y="398" width="130" height="30" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="349" y="417" text-anchor="middle" font-size="9" fill="#6B7280">GPU 추론 #N ···</text>

  <!-- arrows from GPU replicas to aggregator -->
  <line x1="415" y1="302" x2="451" y2="360" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="415" y1="362" x2="451" y2="365" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="415" y1="413" x2="451" y2="375" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- 결과 집계 -->
  <rect x="452" y="338" width="110" height="54" rx="6" fill="#D1FAE5" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="507" y="358" text-anchor="middle" font-size="9" font-weight="bold" fill="#374151">결과 집계</text>
  <text x="507" y="373" text-anchor="middle" font-size="8" fill="#6B7280">임베딩 병합</text>
  <text x="507" y="386" text-anchor="middle" font-size="8" fill="#6B7280">응답 반환</text>

  <!-- arrow to throughput -->
  <line x1="563" y1="365" x2="597" y2="365" stroke="#059669" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- 처리량 결과 박스 -->
  <rect x="598" y="320" width="140" height="96" rx="8" fill="#059669" stroke="none"/>
  <text x="668" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="white">처리량 향상</text>
  <text x="668" y="368" text-anchor="middle" font-size="22" font-weight="bold" fill="white">16x</text>
  <text x="668" y="390" text-anchor="middle" font-size="10" fill="#D1FAE5">단문 기준</text>
  <text x="668" y="406" text-anchor="middle" font-size="9" fill="#D1FAE5">230,000 토큰/초</text>

  <!-- 구분선 (before/after 사이) -->
  <line x1="20" y1="232" x2="760" y2="232" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="6,4"/>
</svg>
