<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" fill="none">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <marker id="arrg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">그래프 기반 vs 벡터 기반 메모리</text>

  <!-- === Vector Memory (left) === -->
  <rect x="20" y="44" width="360" height="32" rx="8" fill="#DBEAFE" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">벡터 기반 메모리</text>

  <!-- Vector nodes (flat) -->
  <circle cx="80" cy="126" r="24" fill="#EFF6FF" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="123" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 A</text>
  <text x="80" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#6B7280">[0.2, 0.8...]</text>

  <circle cx="200" cy="126" r="24" fill="#EFF6FF" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="123" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 B</text>
  <text x="200" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#6B7280">[0.5, 0.3...]</text>

  <circle cx="320" cy="126" r="24" fill="#EFF6FF" stroke="#374151" stroke-width="1.5"/>
  <text x="320" y="123" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 C</text>
  <text x="320" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#6B7280">[0.9, 0.1...]</text>

  <circle cx="140" cy="200" r="24" fill="#EFF6FF" stroke="#374151" stroke-width="1.5"/>
  <text x="140" y="197" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 D</text>
  <text x="140" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#6B7280">[0.4, 0.6...]</text>

  <circle cx="260" cy="200" r="24" fill="#EFF6FF" stroke="#374151" stroke-width="1.5"/>
  <text x="260" y="197" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 E</text>
  <text x="260" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#6B7280">[0.7, 0.2...]</text>

  <!-- Vector: similarity score lines (thin dashed) -->
  <line x1="104" y1="126" x2="176" y2="126" stroke="#93C5FD" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="224" y1="126" x2="296" y2="126" stroke="#93C5FD" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="164" y1="200" x2="236" y2="200" stroke="#93C5FD" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Query arrow → similarity score -->
  <rect x="60" y="248" width="280" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="200" y="259" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">쿼리 → cosine similarity 순 반환</text>
  <text x="200" y="271" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">관계 유형·시간 정보 손실</text>

  <!-- Vector limitations -->
  <rect x="20" y="292" width="360" height="72" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="200" y="308" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">한계</text>
  <text x="200" y="322" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 기억 간 명시적 관계 없음 (A → B 왜 연결?)</text>
  <text x="200" y="335" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• Multi-hop 추론 불가 (A → B → C 경로 탐색)</text>
  <text x="200" y="348" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 시간 변화 추적 어려움</text>
  <text x="200" y="361" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 과거 상태 복원 불가</text>

  <!-- === Graph Memory (right) === -->
  <rect x="440" y="44" width="360" height="32" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="620" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">그래프 기반 메모리 (Graphiti/Zep)</text>

  <!-- Graph nodes with labeled edges -->
  <circle cx="500" cy="126" r="24" fill="#ECFDF5" stroke="#374151" stroke-width="1.5"/>
  <text x="500" y="123" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 A</text>
  <text x="500" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#374151">entity</text>

  <circle cx="620" cy="110" r="24" fill="#ECFDF5" stroke="#374151" stroke-width="1.5"/>
  <text x="620" y="107" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 B</text>
  <text x="620" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#374151">event</text>

  <circle cx="740" cy="126" r="24" fill="#ECFDF5" stroke="#374151" stroke-width="1.5"/>
  <text x="740" y="123" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 C</text>
  <text x="740" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#374151">fact</text>

  <circle cx="560" cy="210" r="24" fill="#ECFDF5" stroke="#374151" stroke-width="1.5"/>
  <text x="560" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 D</text>
  <text x="560" y="218" text-anchor="middle" font-family="monospace" font-size="7" fill="#374151">belief</text>

  <circle cx="680" cy="210" r="24" fill="#ECFDF5" stroke="#374151" stroke-width="1.5"/>
  <text x="680" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">기억 E</text>
  <text x="680" y="218" text-anchor="middle" font-family="monospace" font-size="7" fill="#374151">relation</text>

  <!-- Labeled graph edges -->
  <line x1="524" y1="126" x2="596" y2="118" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="558" y="116" text-anchor="middle" font-family="monospace" font-size="7" fill="#059669">CAUSED</text>

  <line x1="644" y1="118" x2="716" y2="124" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="682" y="114" text-anchor="middle" font-family="monospace" font-size="7" fill="#059669">HAS</text>

  <line x1="510" y1="148" x2="546" y2="188" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="517" y="175" text-anchor="middle" font-family="monospace" font-size="7" fill="#059669">PRIOR</text>

  <line x1="630" y1="130" x2="670" y2="188" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="664" y="168" text-anchor="middle" font-family="monospace" font-size="7" fill="#059669">UPDATED</text>

  <line x1="584" y1="210" x2="656" y2="210" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="620" y="206" text-anchor="middle" font-family="monospace" font-size="7" fill="#059669">RELATED</text>

  <!-- Query box -->
  <rect x="480" y="250" width="280" height="28" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="620" y="261" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">쿼리 → 관계 경로 탐색 + 시간 필터</text>
  <text x="620" y="273" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">entity_valid_at, fact_valid_at (bi-temporal)</text>

  <!-- Graph advantages -->
  <rect x="440" y="292" width="360" height="72" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="620" y="308" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">장점</text>
  <text x="620" y="322" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 관계 레이블 보존 (CAUSED, HAS, PRIOR 등)</text>
  <text x="620" y="335" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• Multi-hop 경로 탐색 가능</text>
  <text x="620" y="348" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• Bi-temporal: 사건 시간 + 기록 시간 분리 추적</text>
  <text x="620" y="361" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 과거 상태 복원 · 모순 감지 가능</text>

  <!-- Center divider -->
  <line x1="410" y1="44" x2="410" y2="372" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="5 3"/>
</svg>
