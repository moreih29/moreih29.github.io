<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" fill="none">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">Generative Agents 메모리 아키텍처 (Park et al., 2023)</text>

  <!-- Environment input -->
  <rect x="20" y="50" width="130" height="44" rx="8" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
  <text x="85" y="69" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">환경 관찰</text>
  <text x="85" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">Observation</text>

  <!-- Memory Stream -->
  <rect x="200" y="36" width="240" height="220" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="320" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#3B82F6" font-weight="bold">Memory Stream</text>

  <!-- Observation block inside stream -->
  <rect x="216" y="68" width="208" height="38" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="320" y="83" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">Observation</text>
  <text x="320" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">직접 지각한 사건 기록</text>

  <!-- Reflection block inside stream -->
  <rect x="216" y="118" width="208" height="52" rx="6" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1"/>
  <text x="320" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">Reflection</text>
  <text x="320" y="149" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">LLM 생성 고수준 인사이트</text>
  <text x="320" y="163" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">트리거: importance 합 ≥ 150</text>

  <!-- Plan block inside stream -->
  <rect x="216" y="182" width="208" height="62" rx="6" fill="#BAE6FD" stroke="#38BDF8" stroke-width="1"/>
  <text x="320" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">Plan</text>
  <text x="320" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">미래 행동 계획</text>
  <text x="320" y="227" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Daily(5-8) → Hourly → Fine(5-15min)</text>
  <text x="320" y="241" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">재귀적 분해</text>

  <!-- Arrow: env → stream -->
  <line x1="150" y1="72" x2="198" y2="87" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Retrieval / Scoring box -->
  <rect x="490" y="50" width="270" height="120" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="625" y="70" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">검색 점수 계산</text>
  <text x="625" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">score = α₁·recency + α₂·importance + α₃·relevance</text>
  <text x="625" y="108" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">모든 α = 1 (등가 가중)</text>
  <line x1="510" y1="118" x2="750" y2="118" stroke="#E5E7EB" stroke-width="1"/>
  <text x="625" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Recency: 지수 감쇠 (계수 0.995)</text>
  <text x="625" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Importance: LLM 1-10 점수</text>
  <text x="625" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Relevance: 코사인 유사도</text>

  <!-- Arrow: stream → scoring -->
  <line x1="440" y1="107" x2="488" y2="107" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="464" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#3B82F6">검색</text>

  <!-- Reflection trigger detail -->
  <rect x="490" y="185" width="270" height="72" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="625" y="203" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">Reflection 생성 과정</text>
  <text x="625" y="219" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">1. 최근 이벤트 importance 합 ≥ 150 감지</text>
  <text x="625" y="233" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">2. 핵심 질문 3개 생성 (LLM)</text>
  <text x="625" y="247" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">3. 관련 기억 검색 → 인사이트 추출</text>

  <!-- Arrow: scoring → reflection -->
  <line x1="625" y1="170" x2="625" y2="183" stroke="#10B981" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Reflection → stream feedback -->
  <path d="M 490 220 Q 450 220 440 200 Q 430 182 440 168" stroke="#10B981" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>

  <!-- Action output -->
  <rect x="200" y="275" width="240" height="44" rx="8" fill="#EDE9FE" stroke="#374151" stroke-width="1.5"/>
  <text x="320" y="293" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">행동 생성</text>
  <text x="320" y="309" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Plan 기반 현재 행동 결정</text>

  <!-- Arrow: stream → action -->
  <line x1="320" y1="256" x2="320" y2="273" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Ablation results box -->
  <rect x="490" y="272" width="270" height="80" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="625" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">Ablation TrueSkill 결과</text>
  <text x="625" y="306" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">완전 아키텍처: 29.89</text>
  <text x="625" y="320" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">기억 없음: 21.21  ← d = 8.16</text>
  <text x="625" y="334" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">인간 비교: 22.95</text>
  <text x="625" y="348" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">반성/계획 제외: 26.88</text>

  <!-- Subsequent systems label -->
  <text x="390" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">참조/확장 후속 연구: MemGPT · MemoryBank · Reflexion · Voyager · A-MEM</text>
</svg>
