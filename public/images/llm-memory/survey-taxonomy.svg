  <rect x="275" y="90" width="230" height="64" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="390" y="107" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">Object × Form × Time (8 Quadrant)</text>
  <text x="390" y="121" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Object: Personal / System</text>
  <text x="390" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Form: Non-param / Parametric</text>
  <text x="390" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Time: Short / Long</text>

