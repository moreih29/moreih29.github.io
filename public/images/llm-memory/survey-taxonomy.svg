  <text x="135" y="121" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Token-level: Flat/Planar/Hierarchical</text>
  <text x="135" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Parametric: Internal/External</text>
  <text x="135" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Latent</text>

