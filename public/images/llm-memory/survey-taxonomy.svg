  <text x="645" y="199" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Long-Term Memory / Long-Context</text>
  <text x="645" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Parametric Modification / Multi-Source</text>

  <!-- A: Dynamics -->
  <rect x="20" y="236" width="230" height="44" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="135" y="253" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">Dynamics (동역학)</text>
  <text x="135" y="267" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Formation → Evolution → Retrieval</text>
  <text x="135" y="281" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">(Consolidation / Updating / Forgetting)</text>

  <!-- B: Perspective -->
  <rect x="275" y="236" width="230" height="44" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="390" y="253" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">에이전트 경계 + 시간 축</text>
  <text x="390" y="267" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">에이전트 vs 시스템 관점</text>
  <text x="390" y="281" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Short/Long-term 이분 포함</text>

  <!-- C: Focus -->
  <rect x="530" y="236" width="230" height="44" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="645" y="253" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">원자적 연산 중심</text>
  <text x="645" y="267" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">인지과학 참조 없이</text>
  <text x="645" y="281" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">AI 시스템 내부 연산에 집중</text>

  <!-- Convergence box -->
  <rect x="20" y="296" width="740" height="36" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="390" y="311" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">수렴 지점: 세 논문 모두 Parametric vs. Contextual 이분법 채택 · 단기/장기 구분 포함</text>
  <text x="390" y="325" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">차이: [A] 에이전트 경계 · [B] 인지과학 계보 · [C] 원자적 연산 — 단순 이분법 부족 인식 공유</text>
