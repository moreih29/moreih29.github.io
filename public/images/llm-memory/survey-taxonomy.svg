  <text x="645" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">Rethinking Memory in AI</text>

  <!-- Row label: Axis 1 -->
  <text x="10" y="110" font-family="monospace" font-size="9" fill="#9CA3AF" transform="rotate(-90, 10, 150)">분류</text>

