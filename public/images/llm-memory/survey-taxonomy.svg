  <text x="645" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Ops(6): Consolidation, Indexing,</text>
  <text x="645" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Updating, Forgetting, Retrieval, Compression</text>

