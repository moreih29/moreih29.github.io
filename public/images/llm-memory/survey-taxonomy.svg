  <text x="390" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">From Human Memory to AI Memory</text>

  <!-- Column C Header -->
  <rect x="530" y="40" width="230" height="36" rx="6" fill="#EDE9FE" stroke="#374151" stroke-width="1.5"/>
