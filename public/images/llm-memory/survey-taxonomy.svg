  <text x="135" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">/ Working</text>

  <!-- B: Cognitive science basis -->
  <rect x="275" y="168" width="230" height="54" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="390" y="185" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">인지과학 직접 매핑</text>
  <text x="390" y="199" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Tulving (Episodic/Semantic)</text>
  <text x="390" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151">Squire (Declarative/Procedural) 계보</text>

  <!-- C: Research Topics -->
  <rect x="530" y="168" width="230" height="54" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
