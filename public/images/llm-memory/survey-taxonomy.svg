  </defs>

  <!-- Title -->
  <text x="390" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">서베이 3편 분류 체계 비교</text>

  <!-- Column A Header -->
  <rect x="20" y="40" width="230" height="36" rx="6" fill="#DBEAFE" stroke="#374151" stroke-width="1.5"/>
  <text x="135" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">[A] 2512.13564</text>
  <text x="135" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">Memory in the Age of AI Agents</text>

  <!-- Column B Header -->
  <rect x="275" y="40" width="230" height="36" rx="6" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
