<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" fill="none">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <marker id="arr-dash" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">인지과학 기억 체계 ↔ AI 메모리 대응 관계</text>

  <!-- Column headers -->
  <text x="195" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">인지과학</text>
  <text x="565" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">AI 메모리</text>
  <line x1="380" y1="35" x2="380" y2="295" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Row 1: Working Memory -->
  <rect x="40" y="60" width="310" height="44" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="195" y="79" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">작업 기억 (Working Memory)</text>
  <text x="195" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">Baddeley · 즉각 처리 · 7±2 청크</text>
  <rect x="410" y="60" width="310" height="44" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="565" y="79" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">컨텍스트 윈도우 / KV-cache</text>
  <text x="565" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">기능적 유사 ✓</text>
  <line x1="350" y1="82" x2="408" y2="82" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 2: Episodic Memory -->
  <rect x="40" y="118" width="310" height="44" rx="8" fill="#DBEAFE" stroke="#374151" stroke-width="1.5"/>
  <text x="195" y="137" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">에피소드 기억 (Episodic)</text>
  <text x="195" y="153" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">Tulving · 언제/어디서 경험 · 자전적</text>
  <rect x="410" y="118" width="310" height="44" rx="8" fill="#DBEAFE" stroke="#374151" stroke-width="1.5"/>
  <text x="565" y="137" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">대화 히스토리 / 상호작용 기록</text>
  <text x="565" y="153" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">부분적 대응 △</text>
  <line x1="350" y1="140" x2="408" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 3: Semantic Memory -->
  <rect x="40" y="176" width="310" height="44" rx="8" fill="#EDE9FE" stroke="#374151" stroke-width="1.5"/>
  <text x="195" y="195" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">의미 기억 (Semantic)</text>
  <text x="195" y="211" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">Tulving · 사실/개념 지식 · 비자전적</text>
  <rect x="410" y="176" width="310" height="44" rx="8" fill="#EDE9FE" stroke="#374151" stroke-width="1.5"/>
  <text x="565" y="195" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">모델 파라미터 내 세계 지식</text>
  <text x="565" y="211" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">유사하나 업데이트 상이 △</text>
  <line x1="350" y1="198" x2="408" y2="198" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 4: Procedural Memory -->
  <rect x="40" y="234" width="310" height="44" rx="8" fill="#FEF3C7" stroke="#374151" stroke-width="1.5"/>
  <text x="195" y="253" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">절차적 기억 (Procedural)</text>
  <text x="195" y="269" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">Squire · 암묵적 기술 · 자동화</text>
  <rect x="410" y="234" width="310" height="44" rx="8" fill="#FEF3C7" stroke="#374151" stroke-width="1.5"/>
  <text x="565" y="253" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">스킬 라이브러리 / LoRA 어댑터</text>
  <text x="565" y="269" text-anchor="middle" font-family="monospace" font-size="9" fill="#6B7280">약한 유추 ✗</text>
  <line x1="350" y1="256" x2="408" y2="256" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

  <!-- Legend -->
  <rect x="40" y="296" width="8" height="8" fill="#374151" rx="1"/>
  <text x="54" y="305" font-family="monospace" font-size="8" fill="#374151">✓ 기능적 유사</text>
  <rect x="160" y="296" width="8" height="8" fill="#9CA3AF" rx="1"/>
  <text x="174" y="305" font-family="monospace" font-size="8" fill="#374151">△ 부분 대응</text>
  <text x="280" y="305" font-family="monospace" font-size="8" fill="#374151">✗ 약한 유추 (Rolls 2024 비판)</text>
</svg>
