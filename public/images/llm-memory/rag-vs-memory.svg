<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" fill="none">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <marker id="arrb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/>
    </marker>
    <marker id="arrg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-family="monospace" font-size="13" fill="#374151" font-weight="bold">RAG vs Agent Memory — 구조적 차이</text>

  <!-- === RAG (left) === -->
  <rect x="20" y="44" width="360" height="32" rx="8" fill="#DBEAFE" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">RAG (Retrieval-Augmented Generation)</text>

  <!-- RAG components -->
  <rect x="60" y="92" width="140" height="32" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="130" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">사용자 쿼리</text>

  <line x1="200" y1="108" x2="220" y2="108" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrb)"/>

  <rect x="220" y="92" width="120" height="32" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="280" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">검색 엔진</text>

  <line x1="130" y1="124" x2="130" y2="148" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrb)"/>
  <line x1="280" y1="124" x2="280" y2="148" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrb)"/>

  <rect x="60" y="148" width="280" height="32" rx="6" fill="#DBEAFE" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="169" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">LLM (쿼리 + 검색 결과 → 응답)</text>

  <line x1="200" y1="180" x2="200" y2="200" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrb)"/>

  <rect x="110" y="200" width="180" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="200" y="219" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">응답</text>

  <!-- RAG: Knowledge store (read-only) -->
  <rect x="20" y="248" width="360" height="52" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="200" y="264" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">Knowledge Store (Read-Only)</text>
  <text x="200" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">문서 인덱스 / 벡터 DB</text>
  <text x="200" y="291" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">쿼리 시마다 재구성 · 상태 없음 (Stateless)</text>

  <!-- RAG characteristics -->
  <rect x="20" y="316" width="360" height="80" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="200" y="333" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">특성</text>
  <text x="200" y="348" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• Read-Only: 검색만 함, 저장소 변경 없음</text>
  <text x="200" y="361" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• Stateless: 요청마다 독립적 처리</text>
  <text x="200" y="374" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 지식은 인간이 큐레이션</text>
  <text x="200" y="387" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 예: Anthropic Contextual Retrieval</text>

  <!-- === Memory (right) === -->
  <rect x="440" y="44" width="360" height="32" rx="8" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="620" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#374151" font-weight="bold">Agent Memory</text>

  <!-- Memory components -->
  <rect x="480" y="92" width="140" height="32" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="550" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">에이전트 입력</text>

  <line x1="620" y1="108" x2="640" y2="108" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>

  <rect x="640" y="92" width="120" height="32" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="700" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">기억 검색</text>

  <line x1="550" y1="124" x2="550" y2="148" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <line x1="700" y1="124" x2="700" y2="148" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>

  <rect x="480" y="148" width="280" height="32" rx="6" fill="#D1FAE5" stroke="#374151" stroke-width="1.5"/>
  <text x="620" y="169" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" font-weight="bold">LLM (추론 + 기억 업데이트 결정)</text>

  <!-- Bidirectional arrow (read + write) -->
  <line x1="620" y1="180" x2="620" y2="200" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <!-- write back arrow -->
  <path d="M 640 200 L 660 210 L 660 195" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrg)"/>

  <rect x="530" y="200" width="180" height="28" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="620" y="219" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151">응답 + 기억 갱신</text>

  <!-- Memory store (read-write) -->
  <rect x="440" y="248" width="360" height="52" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="620" y="264" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">Memory Store (Read-Write)</text>
  <text x="620" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">벡터 DB + 그래프 DB + KV 스토어</text>
  <text x="620" y="291" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B7280">에이전트가 직접 쓰기 · 상태 지속 (Stateful)</text>

  <!-- Memory characteristics -->
  <rect x="440" y="316" width="360" height="80" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="620" y="333" text-anchor="middle" font-family="monospace" font-size="9" fill="#374151" font-weight="bold">특성</text>
  <text x="620" y="348" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• Read-Write: 에이전트가 기억을 추가·수정·삭제</text>
  <text x="620" y="361" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• Stateful: 세션 간 상태 지속</text>
  <text x="620" y="374" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 기억은 에이전트가 자율 형성</text>
  <text x="620" y="387" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">• 예: Letta, A-MEM, MAGMA, Graphiti</text>

  <!-- Center divider -->
  <line x1="410" y1="44" x2="410" y2="404" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Hybrid zone note -->
  <rect x="300" y="396" width="220" height="18" rx="4" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1"/>
  <text x="410" y="409" text-anchor="middle" font-family="monospace" font-size="8" fill="#374151">경계 모호 영역: Agentic RAG · Mem0 · Graphiti</text>
</svg>
